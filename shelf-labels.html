<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axis Chems — Label Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B4CB8;--blue:#1E7FE8;--cyan:#4FB3FF;
  --bg:#04080f;--panel:rgba(14,28,55,0.5);--panel2:rgba(14,28,55,0.8);
  --border:rgba(60,100,140,0.25);--border-hi:rgba(30,127,232,0.45);
  --text:#f0ece9;--muted:#5580a8;--dim:#6B7283;
}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}

/* ── TOP BAR ── */
#bar{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  background:rgba(4,8,15,0.9);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
  flex-wrap:wrap;
}
#bar a{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  text-decoration:none;transition:.15s;}
#bar a:hover{color:var(--text);border-color:var(--muted);}
#bar h1{font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--text);}
#bar .sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto;}

/* ── LAYOUT ── */
#wrap{display:grid;grid-template-columns:270px 1fr;gap:16px;padding:20px;max-width:1200px;margin:0 auto;align-items:start;}
@media(max-width:700px){#wrap{grid-template-columns:1fr;}}

/* ── PANELS ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;}
.panel-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3c648c;
  text-transform:uppercase;letter-spacing:.15em;display:block;margin-bottom:14px;}

/* ── SEARCH + LIST ── */
#search{width:100%;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;margin-bottom:8px;}
#search:focus{border-color:var(--border-hi);}
#count-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
#count-bar span{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3c648c;letter-spacing:.1em;text-transform:uppercase;}
#clear-queue{background:transparent;border:none;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;display:none;}

#list{display:flex;flex-direction:column;gap:5px;max-height:58vh;overflow-y:auto;padding-right:3px;margin-bottom:10px;}
#list::-webkit-scrollbar{width:3px}#list::-webkit-scrollbar-thumb{background:var(--border)}

.row{background:var(--panel2);border:1px solid var(--border);border-radius:9px;
  padding:8px 10px;cursor:pointer;display:flex;align-items:center;
  justify-content:space-between;transition:.13s;user-select:none;}
.row:hover{border-color:rgba(60,100,140,.45);}
.row.sel{background:rgba(30,127,232,.12);border-color:var(--border-hi);}
.row.queued{border-color:rgba(11,76,184,.35);}
.row-info .rn{font-size:12px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.row-info .rv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan);margin-top:2px;}
.row-actions{display:flex;gap:4px;flex-shrink:0;}
.btn-sm{border-radius:5px;padding:3px 7px;font-family:'JetBrains Mono',monospace;
  font-size:10px;cursor:pointer;border:1px solid;transition:.13s;}
.btn-q{background:rgba(14,28,55,.6);border-color:var(--border);color:#3c648c;}
.btn-q.on{background:rgba(30,127,232,.25);border-color:rgba(30,127,232,.5);color:var(--cyan);}
.btn-print{background:rgba(11,76,184,.2);border-color:rgba(11,76,184,.35);color:var(--cyan);}
.btn-del{background:rgba(180,40,40,.1);border-color:rgba(180,40,40,.2);color:#ff6b6b;}
.btn-add{background:rgba(30,127,232,.15);border:1px solid rgba(30,127,232,.3);
  color:var(--cyan);border-radius:7px;padding:5px 11px;
  font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;}

#btn-print-queue{
  width:100%;padding:10px 16px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.06em;border:none;
  background:rgba(14,28,55,.7);color:var(--muted);
  border:1px solid var(--border);transition:.2s;
}
#btn-print-queue.has-queue{background:linear-gradient(135deg,#0B4CB8,#1E7FE8);color:#fff;border-color:transparent;}

/* ── RIGHT COLUMN ── */
#right{display:flex;flex-direction:column;gap:16px;}

/* ── PREVIEW ── */
#preview-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
/* 96dpi: 4in=384px 2in=192px */
#label-preview{
  width:384px;height:192px;position:relative;
  background:#08090C;overflow:hidden;flex-shrink:0;
  outline:1px dashed rgba(255,255,255,.15);
}
.lp-accent{position:absolute;left:0;top:0;bottom:0;width:8px;
  background:linear-gradient(180deg,#4FB3FF 0%,#0B4CB8 100%);}
.lp-body{position:absolute;left:8px;top:0;right:0;bottom:0;
  padding:14px 18px 12px 16px;display:flex;flex-direction:column;
  justify-content:space-between;
  background:linear-gradient(135deg,#0E1421 0%,#08090C 60%);}
.lp-body::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(30,127,232,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,127,232,.05) 1px,transparent 1px);
  background-size:24px 24px;}
.lp-body::after{content:'';position:absolute;top:-24px;right:-24px;
  width:140px;height:140px;border-radius:50%;pointer-events:none;
  background:radial-gradient(closest-side,rgba(30,127,232,.15),transparent);}
.lp-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
.lp-logo{width:auto;object-fit:contain;}
.lp-ruo{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;
  letter-spacing:.18em;color:rgba(79,179,255,.6);
  border:1px solid rgba(79,179,255,.25);padding:3px 6px;border-radius:2px;}
.lp-mid{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;
  justify-content:center;padding:6px 0 4px;border-bottom:1px solid rgba(255,255,255,.07);}
.lp-name{font-family:'Inter',sans-serif;font-weight:800;color:#F5F2EA;
  letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;}
.lp-variant{font-family:'JetBrains Mono',monospace;font-weight:600;color:#4FB3FF;
  letter-spacing:.08em;text-transform:uppercase;margin-top:7px;line-height:1;}
.lp-bot{display:flex;align-items:baseline;justify-content:space-between;
  position:relative;z-index:1;padding-top:8px;}
.lp-sku{font-family:'JetBrains Mono',monospace;font-weight:500;color:#6B7283;
  letter-spacing:.12em;text-transform:uppercase;}
.lp-price{font-family:'JetBrains Mono',monospace;font-weight:800;color:#F5F2EA;
  letter-spacing:-.01em;line-height:1;}
.lp-dollar{font-weight:500;color:#4FB3FF;vertical-align:super;margin-right:1px;}

.preview-actions{display:flex;gap:10px;align-self:flex-end;}
.btn-secondary{background:rgba(14,28,55,.8);border:1px solid var(--border);
  border-radius:8px;padding:7px 15px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:.15s;}
.btn-secondary.on{background:rgba(30,127,232,.2);border-color:rgba(30,127,232,.4);color:var(--cyan);}
.btn-primary{background:linear-gradient(135deg,#0B4CB8,#1E7FE8);border:none;
  border-radius:8px;padding:7px 18px;color:#fff;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;}

/* ── EDIT FIELDS ── */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;}
.field input{background:var(--panel2);border:1px solid var(--border);border-radius:7px;
  padding:7px 11px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:12px;outline:none;width:100%;transition:.13s;}
.field input:focus{border-color:var(--border-hi);}

/* ── SLIDERS ── */
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  width:100px;flex-shrink:0;text-transform:uppercase;letter-spacing:.1em;}
.slider-row input[type=range]{flex:1;accent-color:#1E7FE8;cursor:pointer;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);
  width:26px;text-align:right;}
.sliders{display:flex;flex-direction:column;gap:13px;}
.btn-reset{align-self:flex-start;background:transparent;border:1px solid var(--border);
  border-radius:6px;padding:4px 12px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.08em;margin-top:4px;}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  @page{size:4in 2in;margin:0;}
  body{background:white;margin:0;padding:0;}
}
</style>
</head>
<body>

<div id="bar">
  <a href="/">← All Brands</a>
  <h1>Axis Chems — Label Studio</h1>
  <span class="sub" id="status-txt">69 SKUs · 4 × 2 in shelf labels</span>
</div>

<div id="wrap">

  <!-- ── LEFT: catalog ── -->
  <div>
    <div class="panel">
      <input id="search" placeholder="Search product, SKU…" oninput="filterList()">
      <div id="count-bar">
        <span id="count-lbl">69 of 69</span>
        <button id="clear-queue" onclick="clearQueue()">clear queue</button>
      </div>
      <div id="list"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
        <button class="btn-add" onclick="addNew()">+ Add Label</button>
      </div>
      <button id="btn-print-queue" onclick="printQueue()">⎙ Print All (69)</button>
    </div>
  </div>

  <!-- ── RIGHT ── -->
  <div id="right">

    <!-- Preview -->
    <div class="panel">
      <span class="panel-label">Preview — 4 × 2 in</span>
      <div id="preview-wrap">
        <div id="label-preview">
          <div class="lp-accent"></div>
          <div class="lp-body">
            <div class="lp-top">
              <img id="lp-logo-img" class="lp-logo" src="" alt="Axis">
              <span class="lp-ruo">RUO ONLY</span>
            </div>
            <div class="lp-mid">
              <div class="lp-name" id="lp-name">Product Name</div>
              <div class="lp-variant" id="lp-variant">10mg</div>
            </div>
            <div class="lp-bot">
              <span class="lp-sku" id="lp-sku">SKU</span>
              <span class="lp-price" id="lp-price-wrap">
                <span class="lp-dollar" id="lp-dollar">$</span><span id="lp-price">0</span>
              </span>
            </div>
          </div>
        </div>
        <div class="preview-actions">
          <button class="btn-secondary" id="btn-toggle-queue" onclick="toggleQueueSelected()">+ Add to Queue</button>
          <button class="btn-primary" onclick="printOne()">⎙ Print This</button>
        </div>
      </div>
    </div>

    <!-- Edit -->
    <div class="panel">
      <span class="panel-label">Edit Label</span>
      <div class="field-grid">
        <div class="field"><label>Product Name</label><input id="f-name" oninput="fieldChanged('name',this.value)" placeholder="e.g. BPC 157"></div>
        <div class="field"><label>Variant / Dose</label><input id="f-variant" oninput="fieldChanged('variant',this.value)" placeholder="e.g. 10mg"></div>
        <div class="field"><label>SKU</label><input id="f-sku" oninput="fieldChanged('sku',this.value)" placeholder="e.g. BPC157-10MG"></div>
        <div class="field"><label>Price (no $)</label><input id="f-price" oninput="fieldChanged('price',this.value)" placeholder="e.g. 65"></div>
      </div>
    </div>

    <!-- Sliders -->
    <div class="panel">
      <span class="panel-label">Size Controls — applies to all labels</span>
      <div class="sliders">
        <div class="slider-row"><label>Logo</label><input type="range" min="14" max="48" id="s-logo" oninput="sizeChanged('logo',this.value)"><span class="slider-val" id="sv-logo">22</span></div>
        <div class="slider-row"><label>Product Name</label><input type="range" min="16" max="44" id="s-name" oninput="sizeChanged('name',this.value)"><span class="slider-val" id="sv-name">32</span></div>
        <div class="slider-row"><label>Variant</label><input type="range" min="10" max="22" id="s-variant" oninput="sizeChanged('variant',this.value)"><span class="slider-val" id="sv-variant">14</span></div>
        <div class="slider-row"><label>Price</label><input type="range" min="18" max="44" id="s-price" oninput="sizeChanged('price',this.value)"><span class="slider-val" id="sv-price">32</span></div>
        <div class="slider-row"><label>$ Symbol</label><input type="range" min="10" max="28" id="s-dollar" oninput="sizeChanged('dollar',this.value)"><span class="slider-val" id="sv-dollar">18</span></div>
        <div class="slider-row"><label>SKU</label><input type="range" min="7" max="14" id="s-sku" oninput="sizeChanged('sku',this.value)"><span class="slider-val" id="sv-sku">9</span></div>
      </div>
      <button class="btn-reset" onclick="resetSizes()">Reset to defaults</button>
    </div>

  </div>
</div>

// ── State ──
let catalog = CATALOG.map((c,i)=>Object.assign({id:i},c));
let selectedId = 0;
let queue = new Set();
let sizes = {logo:22,name:32,variant:14,price:32,dollar:18,sku:9};
let uidCounter = catalog.length;

function uid(){ return ++uidCounter; }

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('lp-logo-img').src = LOGO;
  renderList();
  selectId(0);
  initSliders();
});

function initSliders(){
  Object.keys(sizes).forEach(k=>{
    const el = document.getElementById('s-'+k);
    if(el){ el.value = sizes[k]; }
  });
}

// ── List ──
function filterList(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = q ? catalog.filter(l=>
    l.name.toLowerCase().includes(q)||
    l.variant.toLowerCase().includes(q)||
    l.sku.toLowerCase().includes(q)
  ) : catalog;
  document.getElementById('count-lbl').textContent = filtered.length+' of '+catalog.length;
  renderRows(filtered);
}

function renderList(){
  filterList();
  updatePrintBtn();
}

function renderRows(items){
  const list = document.getElementById('list');
  list.innerHTML = items.map(l=>`
    <div class="row${l.id===selectedId?' sel':''}${queue.has(l.id)?' queued':''}" onclick="selectId(${l.id})">
      <div class="row-info">
        <div class="rn">${escH(l.name)}</div>
        <div class="rv">${escH(l.variant)} · <span style="color:#f0ece9">$${escH(l.price)}</span></div>
      </div>
      <div class="row-actions">
        <button class="btn-sm btn-q${queue.has(l.id)?' on':''}" onclick="event.stopPropagation();toggleQ(${l.id})" title="${queue.has(l.id)?'Remove from queue':'Add to queue'}">${queue.has(l.id)?'✓':'+'}</button>
        <button class="btn-sm btn-print" onclick="event.stopPropagation();printId(${l.id})" title="Print">⎙</button>
        ${catalog.length>1?`<button class="btn-sm btn-del" onclick="event.stopPropagation();removeId(${l.id})" title="Remove">✕</button>`:''}
      </div>
    </div>
  `).join('');
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Select ──
function selectId(id){
  selectedId = id;
  const l = catalog.find(x=>x.id===id);
  if(!l) return;
  document.getElementById('f-name').value = l.name;
  document.getElementById('f-variant').value = l.variant;
  document.getElementById('f-sku').value = l.sku;
  document.getElementById('f-price').value = l.price;
  updatePreview();
  renderList();
}

// ── Edit ──
function fieldChanged(field,val){
  const l = catalog.find(x=>x.id===selectedId);
  if(!l) return;
  l[field] = val;
  updatePreview();
  renderList();
}

// ── Preview ──
function updatePreview(){
  const l = catalog.find(x=>x.id===selectedId);
  if(!l) return;
  document.getElementById('lp-name').textContent = l.name||'Product Name';
  document.getElementById('lp-name').style.fontSize = sizes.name+'px';
  document.getElementById('lp-variant').textContent = l.variant||'10mg';
  document.getElementById('lp-variant').style.fontSize = sizes.variant+'px';
  document.getElementById('lp-sku').textContent = l.sku||'SKU';
  document.getElementById('lp-sku').style.fontSize = sizes.sku+'px';
  document.getElementById('lp-price').textContent = l.price||'0';
  document.getElementById('lp-price-wrap').style.fontSize = sizes.price+'px';
  document.getElementById('lp-dollar').style.fontSize = sizes.dollar+'px';
  document.getElementById('lp-logo-img').style.height = sizes.logo+'px';
  // queue button
  const qBtn = document.getElementById('btn-toggle-queue');
  if(queue.has(selectedId)){ qBtn.textContent='✓ In Queue'; qBtn.classList.add('on'); }
  else{ qBtn.textContent='+ Add to Queue'; qBtn.classList.remove('on'); }
}

// ── Sizes ──
function sizeChanged(key,val){
  sizes[key] = parseInt(val);
  document.getElementById('sv-'+key).textContent = val;
  updatePreview();
}

function resetSizes(){
  sizes = {logo:22,name:32,variant:14,price:32,dollar:18,sku:9};
  initSliders();
  Object.keys(sizes).forEach(k=>{ document.getElementById('sv-'+k).textContent=sizes[k]; });
  updatePreview();
}

// ── Queue ──
function toggleQ(id){
  queue.has(id)?queue.delete(id):queue.add(id);
  updatePrintBtn();
  renderList();
  if(id===selectedId) updatePreview();
}

function toggleQueueSelected(){ toggleQ(selectedId); }

function clearQueue(){
  queue.clear();
  updatePrintBtn();
  renderList();
  updatePreview();
}

function updatePrintBtn(){
  const btn = document.getElementById('btn-print-queue');
  const clearBtn = document.getElementById('clear-queue');
  if(queue.size>0){
    btn.textContent='⎙ Print Queue ('+queue.size+')';
    btn.classList.add('has-queue');
    clearBtn.style.display='block';
  } else {
    btn.textContent='⎙ Print All ('+catalog.length+')';
    btn.classList.remove('has-queue');
    clearBtn.style.display='none';
  }
}

// ── Add / Remove ──
function addNew(){
  const l = {id:uid(),name:'New Product',variant:'10mg',sku:'NEW-SKU',price:'0'};
  catalog.push(l);
  selectedId = l.id;
  renderList();
  selectId(l.id);
}

function removeId(id){
  catalog = catalog.filter(x=>x.id!==id);
  queue.delete(id);
  if(selectedId===id && catalog.length>0) selectedId=catalog[0].id;
  renderList();
  selectId(selectedId);
  updatePrintBtn();
}

// ── Print helpers ──
const PRINT_HEAD = `<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}@page{size:4in 2in;margin:0;}body{margin:0;padding:0;}</style>
</head><body>`;

function buildLabelHtml(l){
  return `<div style="width:4in;height:2in;position:relative;background:#08090C;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;">
  <div style="position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(180deg,#4FB3FF 0%,#0B4CB8 100%);"></div>
  <div style="position:absolute;left:8px;top:0;right:0;bottom:0;padding:14px 18px 12px 16px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(135deg,#0E1421 0%,#08090C 60%);">
    <div style="position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(30,127,232,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(30,127,232,.05) 1px,transparent 1px);background-size:24px 24px;"></div>
    <div style="position:absolute;top:-24px;right:-24px;width:140px;height:140px;border-radius:50%;pointer-events:none;background:radial-gradient(closest-side,rgba(30,127,232,.15),transparent);"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;">
      <img src="${LOGO}" style="height:${sizes.logo}px;width:auto;">
      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.18em;color:rgba(79,179,255,.6);border:1px solid rgba(79,179,255,.25);padding:3px 6px;border-radius:2px;">RUO ONLY</span>
    </div>
    <div style="position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 0 4px;border-bottom:1px solid rgba(255,255,255,.07);">
      <div style="font-family:'Inter',sans-serif;font-size:${sizes.name}px;font-weight:800;color:#F5F2EA;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;">${l.name}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:${sizes.variant}px;font-weight:600;color:#4FB3FF;letter-spacing:.08em;text-transform:uppercase;margin-top:7px;line-height:1;">${l.variant}</div>
    </div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;position:relative;z-index:1;padding-top:8px;">
      <span style="font-family:'JetBrains Mono',monospace;font-size:${sizes.sku}px;font-weight:500;color:#6B7283;letter-spacing:.12em;text-transform:uppercase;">${l.sku}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:${sizes.price}px;font-weight:800;color:#F5F2EA;letter-spacing:-.01em;line-height:1;"><span style="font-size:${sizes.dollar}px;font-weight:500;color:#4FB3FF;vertical-align:super;margin-right:1px;">$</span>${l.price}</span>
    </div>
  </div>
</div>`;
}

function openPrint(labels){
  const w = window.open('','_blank');
  if(!w) return;
  const body = labels.map((l,i)=>
    `<div style="${i<labels.length-1?'page-break-after:always;':''}">${buildLabelHtml(l)}</div>`
  ).join('');
  w.document.write(PRINT_HEAD+body+`<script>window.onload=function(){setTimeout(function(){window.print();window.close();},400);}<\/script></body></html>`);
  w.document.close();
}

function printOne(){
  const l = catalog.find(x=>x.id===selectedId);
  if(l) openPrint([l]);
}

function printId(id){
  const l = catalog.find(x=>x.id===id);
  if(l) openPrint([l]);
}

function printQueue(){
  const items = queue.size>0 ? catalog.filter(x=>queue.has(x.id)) : catalog;
  openPrint(items);
}
</script>
