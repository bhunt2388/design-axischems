<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auro · Label Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8952A; --gold2:#D4AF50; --gold3:#F0D080;
  --dark:#0A0A08; --dark2:#141410; --dark3:#1E1E18;
  --cream:#F8F4E8; --cream2:#EDE8D6;
  --text:#1A1A14; --text2:#5A5640; --text3:#9A9470;
  --white:#FFFFFF;
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:56px;background:var(--dark2);border-bottom:1px solid rgba(184,149,42,0.2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px}
.tb-brand{display:flex;align-items:center;gap:12px}
.tb-logo{width:32px;height:32px}
.tb-name{font-size:16px;font-weight:700;letter-spacing:0.04em;color:var(--gold2)}
.tb-name span{color:var(--cream);opacity:0.5;font-weight:300;font-size:13px;margin-left:8px}
.tb-back{font-size:12px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(184,149,42,0.2);border-radius:5px;transition:all 0.15s}
.tb-back:hover{color:var(--gold2);border-color:rgba(184,149,42,0.5)}
.tb-meta{font-size:11px;color:var(--text3);letter-spacing:0.08em}
.tb-export{padding:8px 18px;background:var(--gold);color:var(--dark);font-weight:700;font-size:13px;border:none;border-radius:6px;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s}
.tb-export:hover{background:var(--gold2)}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - 56px)}

/* PANEL */
.panel{width:300px;flex-shrink:0;background:var(--dark2);border-right:1px solid rgba(184,149,42,0.15);overflow-y:auto}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:rgba(184,149,42,0.2)}
.pi{padding:16px}
.sec{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin:16px 0 9px;font-weight:600;border-top:1px solid rgba(184,149,42,0.12);padding-top:13px}
.sec.first{border-top:none;margin-top:0;padding-top:0}
label{display:block;font-size:11px;margin:6px 0 3px;color:var(--text3);letter-spacing:0.02em}
input[type=text],select{width:100%;padding:8px 10px;border-radius:5px;border:1px solid rgba(184,149,42,0.2);background:rgba(255,255,255,0.04);color:var(--cream);font-size:13px;font-family:'Inter',sans-serif}
input[type=number]{padding:7px 8px;border-radius:5px;border:1px solid rgba(184,149,42,0.2);background:rgba(255,255,255,0.04);color:var(--cream);font-size:13px;width:100%;text-align:center}
input:focus,select:focus{outline:none;border-color:var(--gold)}
select{cursor:pointer}
.row{display:flex;gap:7px;align-items:flex-end;margin-bottom:2px}
.grow{flex:1}.sw{width:64px}
.swl{font-size:10px;color:var(--text3)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(184,149,42,0.2);border:none;padding:0;margin:5px 0 3px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);border:2px solid var(--dark);cursor:pointer}
.szrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(184,149,42,0.08);font-size:12px;color:rgba(248,244,232,0.7)}
.togrow:last-of-type{border:none}
.tog{width:38px;height:20px;border-radius:20px;background:rgba(184,149,42,0.15);position:relative;cursor:pointer;transition:.18s;flex-shrink:0}
.tog::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:rgba(184,149,42,0.4);transition:.18s}
.tog.on{background:var(--gold)}.tog.on::after{left:20px;background:#fff}
.btn{margin-top:8px;width:100%;padding:9px;border:0;border-radius:6px;background:var(--gold);color:var(--dark);font-weight:700;cursor:pointer;font-size:13px;transition:background .15s}
.btn:hover{background:var(--gold2)}
.btn.alt{background:rgba(184,149,42,0.08);border:1px solid rgba(184,149,42,0.2);color:var(--text3)}
.btn.alt:hover{background:rgba(184,149,42,0.15);color:var(--cream)}
small{color:var(--text3);font-size:11px;line-height:1.6;display:block;margin-top:8px}

/* STAGE */
.stage{flex:1;background:#08080A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow:auto;gap:12px}
.stage-lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(184,149,42,0.4);font-weight:600}
.stage-inner{width:100%;max-width:960px}
svg#lbl{width:100%;height:auto;display:block;border-radius:4px;box-shadow:0 0 0 1px rgba(184,149,42,0.15),0 12px 60px rgba(0,0,0,0.8)}
.drag{cursor:grab}.drag:active{cursor:grabbing}

/* tpl */
.tpl-row{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.tpl-name{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(184,149,42,0.2);color:var(--cream);padding:5px 8px;border-radius:5px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-load{padding:5px 11px;border-radius:5px;background:rgba(184,149,42,0.12);border:1px solid rgba(184,149,42,0.2);color:var(--gold);cursor:pointer;font-size:12px;font-weight:700}
.tpl-load:hover{background:rgba(184,149,42,0.22)}
.tpl-del{padding:5px 9px;border-radius:5px;background:transparent;border:1px solid rgba(185,28,28,0.2);color:#f87171;cursor:pointer;font-size:12px}
.tpl-del:hover{background:rgba(185,28,28,0.15)}
.tpl-empty{font-size:12px;color:var(--text3);font-style:italic;padding:4px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">
    <!-- Auro logo SVG inline -->
    <svg class="tb-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="14" fill="none" stroke="#B8952A" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="9" fill="none" stroke="#D4AF50" stroke-width="1"/>
      <circle cx="16" cy="16" r="3.5" fill="#B8952A"/>
      <line x1="16" y1="2" x2="16" y2="6" stroke="#B8952A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="26" x2="16" y2="30" stroke="#B8952A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="2" y1="16" x2="6" y2="16" stroke="#B8952A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="26" y1="16" x2="30" y2="16" stroke="#B8952A" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="tb-name">AURO <span>— Label Studio</span></div>
  </div>
  <div class="tb-meta">1.75″ × 0.75″ · GOLD / DARK</div>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="/" class="tb-back">← All Brands</a>
    <button class="tb-export" onclick="dl('png')">⬇ Export PNG</button>
  </div>
</div>

<div class="wrap">
 <div class="panel"><div class="pi">

  <div class="sec first">Saved Templates</div>
  <div id="tplList"><div class="tpl-empty">No templates yet.</div></div>

  <div class="sec">Quick Load · Library</div>
  <select id="preset"><option value="">— Select compound —</option></select>

  <div class="sec">Label Text</div>
  <label>Product name · <span id="prodSzVal">110</span> px</label>
  <div class="szrow">
    <input type="range" id="sz_PRODUCT" min="20" max="260" value="110" style="flex:1;margin:0">
    <input type="number" id="sz_PRODUCT_num" min="20" max="260" value="110" style="width:54px">
  </div>
  <input type="text" id="in_PRODUCT" value="BACTERIOSTATIC WATER">

  <div class="row" style="margin-top:9px">
    <div class="grow"><label>Dose</label><input type="text" id="in_DOSE" value="30ml"></div>
    <div class="sw"><label class="swl">px</label><input type="number" id="sz_DOSE" min="8" max="260" value="56"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Purity</label><input type="text" id="in_PURITY" value="≥ 99% PURE"></div>
    <div class="sw"><label class="swl">px</label><input type="number" id="sz_PURITY" min="8" max="260" value="40"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Disclaimer</label><input type="text" id="in_DISCLAIMER" value="FOR RESEARCH USE ONLY · NOT FOR HUMAN CONSUMPTION"></div>
    <div class="sw"><label class="swl">px</label><input type="number" id="sz_DISCLAIMER" min="8" max="260" value="28"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Batch</label><input type="text" id="in_BATCH" value="BATCH:"></div>
    <div class="sw"><label class="swl">px</label><input type="number" id="sz_META" min="8" max="260" value="26"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Expiry</label><input type="text" id="in_EXPIRY" value="EXP:"></div>
    <div class="sw"><label class="swl">px</label><span style="display:block;height:34px"></span></div>
  </div>
  <div class="row">
    <div class="grow"><label>Footer</label><input type="text" id="in_FOOTER" value="LYOPHILIZED POWDER"></div>
    <div class="sw"><label class="swl">px</label><input type="number" id="sz_FOOTER" min="8" max="260" value="36"></div>
  </div>

  <div class="sec">Scale</div>
  <label>Overall · <span id="scaleVal">100%</span></label>
  <input type="range" id="scale" min="0.5" max="1.5" step="0.02" value="1">

  <div class="sec">Show / Hide</div>
  <div class="togrow"><span>Purity</span><div class="tog on" data-show="PURITY"></div></div>
  <div class="togrow"><span>Disclaimer</span><div class="tog on" data-show="DISCLAIMER"></div></div>
  <div class="togrow"><span>Batch</span><div class="tog on" data-show="BATCH"></div></div>
  <div class="togrow"><span>Expiry</span><div class="tog on" data-show="EXPIRY"></div></div>

  <button class="btn alt" id="resetPos" style="margin-top:12px">↺ Reset Positions</button>
  <small>Drag any element to reposition. Save your layout as a template.</small>

  <div class="sec">Templates</div>
  <button class="btn" onclick="saveTpl()" style="background:linear-gradient(135deg,#B8952A,#D4AF50);color:#0A0A08">💾 Save Template</button>

  <div class="sec">Export</div>
  <button class="btn" onclick="dl('png')">⬇ PNG · 3360×1440 print</button>
  <button class="btn alt" onclick="dl('svg')" style="margin-top:6px">⬇ SVG · vector</button>

 </div></div>

 <div class="stage">
  <div class="stage-lbl">Auro · 1.75″ × 0.75″ Label Preview</div>
  <div class="stage-inner">
  <!-- SVG LABEL: 1680×720 viewBox -->
  <svg id="lbl" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1680 720">
   <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#D4AF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A10;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0A06;stop-opacity:1"/>
    </linearGradient>
    <!-- Subtle radial glow -->
    <radialGradient id="glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B8952A;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:0"/>
    </radialGradient>
   </defs>

   <!-- ── DARK BACKGROUND ── -->
   <rect width="1680" height="720" fill="url(#goldGradV)"/>
   <rect width="1680" height="720" fill="url(#glow)"/>

   <!-- Gold top border accent -->
   <rect x="0" y="0" width="1680" height="3" fill="url(#goldGrad)"/>
   <!-- Gold bottom border accent -->
   <rect x="0" y="717" width="1680" height="3" fill="url(#goldGrad)"/>
   <!-- Left gold accent bar -->
   <rect x="0" y="0" width="6" height="720" fill="url(#goldGrad)"/>

   <!-- ── AURO LOGO — SVG inline, top left ── -->
   <g transform="translate(32, 32)">
     <!-- Concentric circles mark -->
     <circle cx="48" cy="48" r="44" fill="none" stroke="#B8952A" stroke-width="2" opacity="0.5"/>
     <circle cx="48" cy="48" r="32" fill="none" stroke="#D4AF50" stroke-width="1.5" opacity="0.6"/>
     <circle cx="48" cy="48" r="18" fill="none" stroke="#B8952A" stroke-width="2" opacity="0.8"/>
     <circle cx="48" cy="48" r="7" fill="#B8952A"/>
     <!-- Cardinal tick marks -->
     <line x1="48" y1="4" x2="48" y2="12" stroke="#B8952A" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
     <line x1="48" y1="84" x2="48" y2="92" stroke="#B8952A" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
     <line x1="4" y1="48" x2="12" y2="48" stroke="#B8952A" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
     <line x1="84" y1="48" x2="92" y2="48" stroke="#B8952A" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
     <!-- AURO text -->
     <text x="116" y="38" font-family="'Playfair Display','Georgia',serif" font-weight="600" font-size="44" fill="#D4AF50" letter-spacing="6">AURO</text>
     <text x="118" y="72" font-family="'Inter',sans-serif" font-weight="300" font-size="18" fill="#B8952A" letter-spacing="8">SCIENCES</text>
   </g>

   <!-- ── GOLD DIVIDER LINE ── -->
   <line x1="32" y1="156" x2="640" y2="156" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

   <!-- ── GOLD CORNER ORNAMENT top-right ── -->
   <g opacity="0.25">
     <line x1="1580" y1="20" x2="1650" y2="20" stroke="#D4AF50" stroke-width="1"/>
     <line x1="1650" y1="20" x2="1650" y2="90" stroke="#D4AF50" stroke-width="1"/>
   </g>
   <g opacity="0.25">
     <line x1="30" y1="700" x2="100" y2="700" stroke="#D4AF50" stroke-width="1"/>
     <line x1="30" y1="630" x2="30" y2="700" stroke="#D4AF50" stroke-width="1"/>
   </g>

   <!-- ── DRAGGABLE TEXT ── -->

   <g id="gPRODUCT" class="drag" transform="translate(0,0)">
     <text id="PRODUCT" x="42" y="335"
       font-family="'Inter',sans-serif" font-weight="800"
       font-size="110" fill="#F0E8C8" letter-spacing="-1">BACTERIOSTATIC WATER</text>
   </g>

   <g id="gDOSE" class="drag" transform="translate(0,0)">
     <!-- Pill outline-only style for dark label -->
     <rect id="DOSE_pill" x="38" y="355" width="160" height="70" rx="35"
       fill="none" stroke="#B8952A" stroke-width="2"/>
     <text id="DOSE" x="118" y="402" text-anchor="middle"
       font-family="'Inter',sans-serif" font-weight="700" font-size="56" fill="#D4AF50">30ml</text>
   </g>

   <g id="gPURITY" class="drag" transform="translate(0,0)">
     <rect id="PURITY_pill" x="210" y="358" width="280" height="64" rx="32"
       fill="none" stroke="rgba(184,149,42,0.4)" stroke-width="1.5"/>
     <text id="PURITY" x="350" y="403" text-anchor="middle"
       font-family="'Inter',sans-serif" font-weight="600" font-size="40" fill="#B8952A">≥ 99% PURE</text>
   </g>

   <g id="gDISCLAIMER" class="drag" transform="translate(0,0)">
     <text id="DISCLAIMER" x="42" y="490"
       font-family="'Inter',sans-serif" font-weight="500"
       font-size="28" fill="rgba(248,244,232,0.45)" letter-spacing="0.5">FOR RESEARCH USE ONLY · NOT FOR HUMAN CONSUMPTION</text>
   </g>

   <g id="gMETA" class="drag" transform="translate(0,0)">
     <text id="BATCH"  x="42"  y="540" font-family="'Inter',sans-serif" font-weight="400" font-size="26" fill="rgba(184,149,42,0.55)">BATCH:</text>
     <text id="EXPIRY" x="240" y="540" font-family="'Inter',sans-serif" font-weight="400" font-size="26" fill="rgba(184,149,42,0.55)">EXP:</text>
   </g>

   <g id="gFOOTER" class="drag" transform="translate(0,0)">
     <text id="FOOTER" x="42" y="648"
       font-family="'Inter',sans-serif" font-weight="300"
       font-size="36" fill="rgba(212,175,80,0.6)" letter-spacing="5">LYOPHILIZED POWDER</text>
   </g>

   <!-- Bottom gold rule -->
   <line x1="32" y1="668" x2="900" y2="668" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.3"/>

  </svg>
  </div>
 </div>
</div>

<script>
const $=id=>document.getElementById(id);
const TEXT={PRODUCT:'in_PRODUCT',DOSE:'in_DOSE',PURITY:'in_PURITY',DISCLAIMER:'in_DISCLAIMER',BATCH:'in_BATCH',EXPIRY:'in_EXPIRY',FOOTER:'in_FOOTER'};
const SIZE={PRODUCT:'sz_PRODUCT',DOSE:'sz_DOSE',PURITY:'sz_PURITY',DISCLAIMER:'sz_DISCLAIMER',BATCH:'sz_META',EXPIRY:'sz_META',FOOTER:'sz_FOOTER'};
const GRP={PRODUCT:'gPRODUCT',DOSE:'gDOSE',PURITY:'gPURITY',DISCLAIMER:'gDISCLAIMER',META:'gMETA',FOOTER:'gFOOTER'};
const POS={PRODUCT:{x:0,y:0},DOSE:{x:0,y:0},PURITY:{x:0,y:0},DISCLAIMER:{x:0,y:0},META:{x:0,y:0},FOOTER:{x:0,y:0}};
const SHOW={PURITY:true,DISCLAIMER:true,BATCH:true,EXPIRY:true};
let SCALE=1;

function applyPos(){for(const k in GRP)$(GRP[k]).setAttribute('transform',`translate(${POS[k].x},${POS[k].y})`);}
function fitPill(tid,rid,cx,pad,minW){try{const bb=$(tid).getBBox(),w=Math.max(minW,bb.width+pad*2);$(rid).setAttribute('width',w);$(rid).setAttribute('x',cx-w/2);$(rid).setAttribute('rx',Math.min(w/2,36));}catch(e){}}
function sync(){
  for(const k in TEXT)$(k).textContent=$(TEXT[k]).value;
  for(const k in SIZE){const s=parseFloat($(SIZE[k]).value);if(s>0)$(k).style.fontSize=(s*SCALE)+'px';}
  $('prodSzVal').textContent=Math.round(parseFloat($('sz_PRODUCT').value)||110)+'px';
  $('gPURITY').style.display=SHOW.PURITY?'':'none';
  $('gDISCLAIMER').style.display=SHOW.DISCLAIMER?'':'none';
  $('BATCH').style.display=SHOW.BATCH?'':'none';
  $('EXPIRY').style.display=SHOW.EXPIRY?'':'none';
  fitPill('DOSE','DOSE_pill',118,36,160);
  if(SHOW.PURITY)fitPill('PURITY','PURITY_pill',350,30,280);
  applyPos();
}
document.querySelectorAll('.panel input:not(#scale):not(#sz_PRODUCT_num),.panel select').forEach(el=>{el.addEventListener('input',sync);el.addEventListener('change',sync);});
$('sz_PRODUCT').addEventListener('input',e=>{$('sz_PRODUCT_num').value=e.target.value;sync();});
$('sz_PRODUCT_num').addEventListener('input',e=>{const v=Math.min(260,Math.max(20,parseInt(e.target.value)||110));$('sz_PRODUCT').value=v;$('sz_PRODUCT_num').value=v;sync();});
$('scale').addEventListener('input',e=>{SCALE=parseFloat(e.target.value);$('scaleVal').textContent=Math.round(SCALE*100)+'%';sync();});
document.querySelectorAll('.tog').forEach(t=>t.addEventListener('click',()=>{t.classList.toggle('on');SHOW[t.dataset.show]=t.classList.contains('on');sync();}));
$('resetPos').addEventListener('click',()=>{for(const k in POS)POS[k]={x:0,y:0};applyPos();});

function svgPx(){return 1680/$('lbl').getBoundingClientRect().width;}
function enableDrag(gid,key){
  const g=$(gid);
  g.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const sc=svgPx(),sx=e.clientX,sy=e.clientY,bx=POS[key].x,by=POS[key].y;
    try{g.setPointerCapture(e.pointerId);}catch(_){}
    g.style.cursor='grabbing';
    const mv=ev=>{POS[key]={x:bx+(ev.clientX-sx)*sc,y:by+(ev.clientY-sy)*sc};g.setAttribute('transform',`translate(${POS[key].x},${POS[key].y})`);};
    const up=()=>{try{g.releasePointerCapture(e.pointerId);}catch(_){}g.style.cursor='grab';g.removeEventListener('pointermove',mv);g.removeEventListener('pointerup',up);g.removeEventListener('pointercancel',up);};
    g.addEventListener('pointermove',mv);g.addEventListener('pointerup',up);g.addEventListener('pointercancel',up);
  });
}
Object.keys(GRP).forEach(k=>enableDrag(GRP[k],k));

// Templates
const TPL_KEY='auro_tpl_v1';
function captureState(){return{pos:JSON.parse(JSON.stringify(POS)),show:JSON.parse(JSON.stringify(SHOW)),scale:SCALE,text:{PRODUCT:$('in_PRODUCT').value,DOSE:$('in_DOSE').value,PURITY:$('in_PURITY').value,DISCLAIMER:$('in_DISCLAIMER').value,BATCH:$('in_BATCH').value,EXPIRY:$('in_EXPIRY').value,FOOTER:$('in_FOOTER').value},sizes:{PRODUCT:$('sz_PRODUCT').value,DOSE:$('sz_DOSE').value,PURITY:$('sz_PURITY').value,DISCLAIMER:$('sz_DISCLAIMER').value,META:$('sz_META').value,FOOTER:$('sz_FOOTER').value}};}
function applyState(s){Object.assign(POS,JSON.parse(JSON.stringify(s.pos)));Object.assign(SHOW,s.show);document.querySelectorAll('.tog').forEach(t=>{const k=t.dataset.show;if(k in s.show)t.classList.toggle('on',s.show[k]);});SCALE=s.scale||1;$('scale').value=SCALE;$('scaleVal').textContent=Math.round(SCALE*100)+'%';for(const[k,v]of Object.entries(s.text)){const el=document.getElementById('in_'+k);if(el)el.value=v;}if(s.sizes){for(const[k,v]of Object.entries(s.sizes)){const el=document.getElementById('sz_'+k);if(el)el.value=v;}$('sz_PRODUCT').value=s.sizes.PRODUCT;$('sz_PRODUCT_num').value=s.sizes.PRODUCT;}sync();}
function loadTpls(){try{return JSON.parse(localStorage.getItem(TPL_KEY)||'[]');}catch{return[];}}
function saveTpls2(a){localStorage.setItem(TPL_KEY,JSON.stringify(a));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderTpls(){const list=loadTpls();const el=$('tplList');if(!list.length){el.innerHTML='<div class="tpl-empty">No templates yet.</div>';return;}el.innerHTML=list.map((t,i)=>`<div class="tpl-row"><span class="tpl-name">${esc(t.name)}</span><button class="tpl-load" onclick="loadTpl(${i})">Load</button><button class="tpl-del" onclick="delTpl(${i})">✕</button></div>`).join('');}
function saveTpl(){const name=prompt('Template name:',($('in_PRODUCT').value||'My Label'));if(!name)return;const list=loadTpls();const idx=list.findIndex(t=>t.name===name);const entry={name,state:captureState(),saved:new Date().toISOString()};if(idx>=0)list[idx]=entry;else list.push(entry);saveTpls2(list);renderTpls();}
function loadTpl(i){const l=loadTpls();if(l[i])applyState(l[i].state);}
function delTpl(i){const l=loadTpls();l.splice(i,1);saveTpls2(l);renderTpls();}

// Catalog
const CAT={"Water / Diluents":[["Bacteriostatic Water","30ml"],["Sterile Water","30ml"],["Sodium Chloride 0.9%","30ml"]],"Metabolic / GLP-1":[["Semaglutide","5 MG"],["Tirzepatide","10 MG"],["Retatrutide","10 MG"],["Cagrilintide","5 MG"],["Liraglutide","5 MG"],["AOD-9604","5 MG"],["MOTS-c","10 MG"]],"Growth Hormone Secretagogues":[["CJC-1295","5 MG"],["CJC-1295 (No DAC)","5 MG"],["Ipamorelin","5 MG"],["Sermorelin","5 MG"],["Tesamorelin","10 MG"],["GHRP-2","5 MG"],["GHRP-6","5 MG"],["HGH Fragment 176-191","5 MG"],["IGF-1 LR3","1 MG"]],"Healing / Recovery":[["BPC-157","5 MG"],["TB-500 (Thymosin b4)","5 MG"],["BPC-157 / TB-500","5/5 MG"],["GHK-Cu","50 MG"]],"Longevity / Anti-Aging":[["NAD+","500 MG"],["Epitalon","10 MG"],["SS-31","10 MG"],["Glutathione","600 MG"]],"Cognitive":[["Semax","30 MG"],["Selank","10 MG"],["Dihexa","5 MG"]],"Sexual Health":[["PT-141","10 MG"],["Oxytocin","2 MG"]]};
const ps=$('preset');
ps.appendChild(Object.assign(document.createElement('option'),{value:'__custom__',textContent:'✏️  Custom'}));
Object.entries(CAT).forEach(([g,items])=>{const og=document.createElement('optgroup');og.label=g;items.forEach(([n,d])=>{const o=document.createElement('option');o.value=n+'|'+d;o.textContent=n+' · '+d;og.appendChild(o);});ps.appendChild(og);});
ps.addEventListener('change',e=>{const v=e.target.value;if(!v)return;if(v==='__custom__'){$('in_PRODUCT').focus();return;}const[n,d]=v.split('|');$('in_PRODUCT').value=n.toUpperCase();$('in_DOSE').value=d;const isW=n.toLowerCase().includes('water')||n.toLowerCase().includes('saline');$('in_FOOTER').value=isW?'STERILE SOLUTION':'LYOPHILIZED POWDER';sync();});

function svgStr(){return new XMLSerializer().serializeToString($('lbl'));}
function dl(type){
  const name=($('in_PRODUCT').value||'auro-label').replace(/[^a-z0-9_\-]/gi,'_');
  const s=svgStr();
  if(type==='svg'){save(new Blob([s],{type:'image/svg+xml'}),name+'.svg');return;}
  const img=new Image(),url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));
  img.onload=()=>{const c=document.createElement('canvas');c.width=3360;c.height=1440;const ctx=c.getContext('2d');ctx.fillStyle='#0A0A08';ctx.fillRect(0,0,3360,1440);ctx.drawImage(img,0,0,3360,1440);URL.revokeObjectURL(url);c.toBlob(b=>save(b,name+'.png'),'image/png',1.0);};
  img.src=url;
}
function save(blob,fn){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();}

renderTpls();sync();
</script>
</body>
