<style>
:root{
  --accent:#003DA5; --band-blue:#003DA5; --silver:#9c9c9c;
  --panel:#11161c; --panel2:#1a222c; --line:#2a3543; --txt:#e7edf4; --muted:#8aa0b5; --hi:#1e7fe8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',system-ui,Arial,sans-serif;background:#0a0e13;color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
#bar .brand{font-weight:900;letter-spacing:.5px;margin-right:8px;font-size:15px}
#bar .brand span{color:var(--hi)}
button{font-family:inherit;font-weight:700;font-size:13px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);padding:8px 12px;border-radius:8px;cursor:pointer;transition:.12s}
button:hover{background:#222d3a;border-color:#3a4a5c}
button.primary{background:var(--hi);border-color:var(--hi);color:#fff}
button.primary:hover{filter:brightness(1.08)}
button.warn:hover{background:#3a1f22;border-color:#7a3b40;color:#ff9aa0}
#main{flex:1;display:flex;min-height:0}
#stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;background:
   radial-gradient(circle at 50% 30%,#131a22,#0a0e13 70%)}
#stage{transform-origin:top left}
#label{position:relative;width:1916px;height:821px;background:#000;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.6);user-select:none}
.band{position:absolute;left:0;width:100%}
#bandBlack{top:0;height:315px;background:var(--band-blk,#000)}
#bandSilver{top:315px;height:20px;background:linear-gradient(180deg,#bdbdbd,var(--silver) 45%,#7f7f7f)}
#bandWhite{top:335px;height:344px;background:var(--band-wht,#ffffff)}
#bandBlue{top:679px;height:142px;background:var(--band-blue)}
.layer{position:absolute;cursor:move;white-space:pre;line-height:1;outline:1px dashed transparent}
.layer.show-outline{outline-color:rgba(30,127,232,.35)}
.layer.sel{outline:1.5px solid var(--hi)!important;outline-offset:2px}
.layer[contenteditable="true"]{cursor:text;outline:1.5px solid #2bd673!important}
.locked{position:absolute;cursor:move}
.locked img{display:block;width:100%;height:100%;pointer-events:none}
.lockbadge{position:absolute;top:-10px;left:-10px;background:#0b1722;border:1px solid var(--hi);color:var(--hi);font-size:11px;font-weight:800;border-radius:6px;padding:1px 5px;display:none;z-index:5}
.layer.sel .lockbadge,.locked.sel .lockbadge{display:block}
.handle{position:absolute;width:14px;height:14px;background:var(--hi);border:2px solid #fff;border-radius:50%;right:-8px;bottom:-8px;cursor:nwse-resize;display:none;z-index:6}
.sel .handle{display:block}
#panel{width:300px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.pgroup{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
.pgroup h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.row label{font-size:12px;color:var(--muted);width:74px;flex-shrink:0}
.row input[type=text],.row textarea,.row select,.row input[type=number]{flex:1;background:#0b1117;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 8px;font-family:inherit;font-size:13px}
.row textarea{resize:vertical;min-height:54px;line-height:1.3}
.row input[type=range]{flex:1}
.row input[type=color]{width:38px;height:30px;background:none;border:1px solid var(--line);border-radius:7px;cursor:pointer;padding:2px}
.val{font-size:11px;color:var(--muted);width:38px;text-align:right}
.muted{color:var(--muted);font-size:12px;line-height:1.5}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 8px;line-height:1.6}
.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.seg button{border:none;border-radius:0;flex:1;padding:7px 0;background:#0b1117}
.seg button.on{background:var(--hi);color:#fff}
kbd{background:#0b1117;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}
.hint{font-size:11px;color:var(--muted);padding:2px 2px 0}
.locktag{display:inline-block;background:#0b1722;border:1px solid var(--hi);color:var(--hi);font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px;margin-left:6px}
</style>
</head>
<body>
<div id="bar">
  <div class="brand">AXIOM <span>LABZ</span> · Label Studio</div>
  <button onclick="addText()">+ Text</button>
  <button id="outlineBtn" onclick="toggleOutlines()">Outlines: On</button>
  <button onclick="resetAll()">Reset</button>
  <div style="flex:1"></div>
  <span class="hint">Drag to move · Double-click text to edit · Corner dot to scale</span>
  <button class="primary" onclick="exportPNG()">⬇ Export PNG</button>
</div>
<div id="main">
  <div id="stageWrap">
    <div id="stage">
      <div id="label">
        <div class="band" id="bandBlack"></div>
        <div class="band" id="bandSilver"></div>
        <div class="band" id="bandWhite"></div>
        <div class="band" id="bandBlue"></div>
        <!-- layers injected by JS -->
      </div>
    </div>
  </div>
  <div id="panel"><div class="empty" id="emptyMsg">Select an element to edit it.<br><br>The <b>logo</b> and <b>QR code</b> are <span class="locktag">LOCKED</span> — original pixels, cannot be edited. You can still reposition or scale them.</div></div>
</div>

function shieldSVG(color){
  return `<svg viewBox="0 0 24 24" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <path fill="${color}" d="M12 1 3 4.6v6.1c0 5.3 3.7 9.9 9 11.3 5.3-1.4 9-6 9-11.3V4.6L12 1z"/>
    <path fill="#fff" d="M10.4 15.9 6.7 12.2l1.6-1.6 2.1 2.1 5-5 1.6 1.6-6.6 6.6z"/>
  </svg>`;
}

function build(){
  [...label.querySelectorAll('.layer,.locked')].forEach(e=>e.remove());
  model.forEach(m=>{
    let el;
    if(m.type==='lock'){
      el=document.createElement('div'); el.className='locked';
      el.style.width=m.w+'px'; el.style.height=m.h+'px';
      const img=document.createElement('img'); img.src=m.src; img.draggable=false; el.appendChild(img);
      el.innerHTML+=`<div class="lockbadge">🔒 ${m.name}</div><div class="handle"></div>`;
    } else if(m.type==='shield'){
      el=document.createElement('div'); el.className='layer';
      el.style.width=m.w+'px'; el.style.height=m.h+'px'; el.innerHTML=shieldSVG(m.color);
      el.innerHTML+=`<div class="lockbadge" style="border-color:#2bd673;color:#2bd673">${m.name}</div><div class="handle"></div>`;
    } else {
      el=document.createElement('div'); el.className='layer';
      const tn=document.createTextNode(m.text); el.appendChild(tn);
      el.style.fontSize=m.size+'px'; el.style.fontWeight=m.weight; el.style.color=m.color;
      el.style.fontFamily=m.font; el.style.letterSpacing=m.ls+'px'; el.style.lineHeight=m.lh;
      el.style.textAlign=m.align;
      el.innerHTML+=`<div class="lockbadge" style="border-color:#2bd673;color:#2bd673">${m.name}</div><div class="handle"></div>`;
    }
    el.style.left=m.x+'px'; el.style.top=m.y+'px';
    if(outlines && m.type!=='lock') el.classList.add('show-outline');
    el.dataset.id=m.id;
    label.appendChild(el);
    wire(el,m);
  });
  if(sel){const e=label.querySelector(`[data-id="${sel}"]`); if(e)e.classList.add('sel');}
}

function getScale(){return parseFloat(stage.dataset.scale||1);}

function wire(el,m){
  let drag=null;
  el.addEventListener('pointerdown',e=>{
    if(el.getAttribute('contenteditable')==='true') return;
    if(e.target.classList.contains('handle')){startResize(e,el,m);return;}
    select(m.id);
    const s=getScale();
    drag={sx:e.clientX,sy:e.clientY,ox:m.x,oy:m.y};
    el.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  el.addEventListener('pointermove',e=>{
    if(!drag)return;const s=getScale();
    m.x=Math.round(drag.ox+(e.clientX-drag.sx)/s);
    m.y=Math.round(drag.oy+(e.clientY-drag.sy)/s);
    el.style.left=m.x+'px';el.style.top=m.y+'px';
    if(sel===m.id) syncPanelPos(m);
  });
  el.addEventListener('pointerup',e=>{drag=null;});
  if(m.type==='text'){
    el.addEventListener('dblclick',()=>editText(el,m));
  }
}

function startResize(e,el,m){
  e.stopPropagation(); select(m.id);
  const s=getScale(); const start={x:e.clientX,y:e.clientY};
  if(m.type==='text'){
    const startSize=m.size;
    const mv=ev=>{const d=(ev.clientX-start.x)/s; m.size=Math.max(8,Math.round(startSize+d*0.45));
      el.style.fontSize=m.size+'px'; if(sel===m.id) refreshPanel(m);};
    const up=()=>{window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
    window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);
  } else {
    const sw=m.w,sh=m.h,ar=m.w/m.h;
    const mv=ev=>{const d=(ev.clientX-start.x)/s; m.w=Math.max(20,Math.round(sw+d)); m.h=Math.round(m.w/ar);
      el.style.width=m.w+'px';el.style.height=m.h+'px';};
    const up=()=>{window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
    window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);
  }
}

function editText(el,m){
  el.querySelectorAll('.lockbadge,.handle').forEach(x=>x.remove());
  el.setAttribute('contenteditable','true'); el.focus();
  const r=document.createRange(); r.selectNodeContents(el); const sgl=getSelection(); sgl.removeAllRanges(); sgl.addRange(r);
  const done=()=>{
    el.removeAttribute('contenteditable');
    m.text=el.innerText.replace(/\n$/,'');
    el.removeEventListener('blur',done);
    build(); select(m.id);
  };
  el.addEventListener('blur',done);
  el.addEventListener('keydown',ev=>{ if(ev.key==='Enter'&&ev.shiftKey){/*newline*/} });
}

function select(id){
  sel=id;
  label.querySelectorAll('.sel').forEach(e=>e.classList.remove('sel'));
  const e=label.querySelector(`[data-id="${id}"]`); if(e)e.classList.add('sel');
  renderPanel();
}
function deselect(){sel=null;label.querySelectorAll('.sel').forEach(e=>e.classList.remove('sel'));renderPanel();}

stageWrap.addEventListener('pointerdown',e=>{ if(e.target===stageWrap||e.target===stage||e.target===label||e.target.classList.contains('band')) deselect(); });

  </div>
  <div class="pgroup"><h4>Type</h4>
    <div class="row"><label>Size</label><input type="range" id="p_size" min="8" max="220" value="${m.size}"><span class="val" id="p_sizeV">${m.size}</span></div>
    <div class="row"><label>Tracking</label><input type="range" id="p_ls" min="-8" max="20" step="0.5" value="${m.ls}"><span class="val" id="p_lsV">${m.ls}</span></div>
    <div class="row"><label>Line</label><input type="range" id="p_lh" min="0.8" max="2" step="0.02" value="${m.lh}"><span class="val" id="p_lhV">${m.lh}</span></div>
    <div class="row"><label>Color</label><input type="color" id="p_color" value="${m.color}"><input type="text" id="p_colorT" value="${m.color}"></div>
    <div class="row"><label>Align</label><div class="seg" id="p_align">
      <button data-a="left">L</button><button data-a="center">C</button><button data-a="right">R</button></div></div>
  </div>
  <div class="pgroup"><h4>Position</h4>${numRow('X','x',m)} ${numRow('Y','y',m)}</div>
  <div class="pgroup"><button class="warn" style="width:100%" onclick="delLayer('${m.id}')">Delete layer</button></div>`;
  const $=id=>document.getElementById(id);
  $('p_text').addEventListener('input',e=>{m.text=e.target.value;liveText(m);});
  $('p_font').value=m.font; $('p_font').onchange=e=>{m.font=e.target.value;build();select(m.id);};
  $('p_weight').value=m.weight; $('p_weight').onchange=e=>{m.weight=e.target.value;build();select(m.id);};
  const isBold=(+m.weight)>=700;
  [...$('p_bold').children].forEach(b=>{ if((b.dataset.b==='1')===isBold)b.classList.add('on');
    b.onclick=()=>{ m.weight = b.dataset.b==='1' ? (m.boldW||700) : 400; build(); select(m.id); };});
  $('p_size').oninput=e=>{m.size=+e.target.value;$('p_sizeV').textContent=m.size;styleLive(m);};
  $('p_ls').oninput=e=>{m.ls=+e.target.value;$('p_lsV').textContent=m.ls;styleLive(m);};
  $('p_lh').oninput=e=>{m.lh=+e.target.value;$('p_lhV').textContent=m.lh;styleLive(m);};
  $('p_color').oninput=e=>{m.color=e.target.value;$('p_colorT').value=e.target.value;styleLive(m);};
  $('p_colorT').onchange=e=>{m.color=e.target.value;build();select(m.id);};
  [...$('p_align').children].forEach(b=>{ if(b.dataset.a===m.align)b.classList.add('on');
    b.onclick=()=>{m.align=b.dataset.a;build();select(m.id);};});
  bindNums(m);
}
function emptyNode(){const d=document.createElement('div');d.className='empty';d.innerHTML='Select an element to edit it.<br><br>The <b>logo</b> and <b>QR code</b> are <span class="locktag">LOCKED</span> — original pixels, cannot be edited. You can still reposition or scale them.';return d;}
function numRow(lbl,key,m,flag){return `<div class="row"><label>${lbl}</label><input type="number" data-k="${key}" value="${Math.round(m[key])}"></div>`;}
function bindNums(m,sq){panel.querySelectorAll('input[type=number]').forEach(inp=>{inp.onchange=e=>{const k=inp.dataset.k;m[k]=+e.target.value; if(sq&&k==='w')m.h=m.w; build();select(m.id);};});}
function syncPanelPos(m){const xi=panel.querySelector('input[data-k="x"]'),yi=panel.querySelector('input[data-k="y"]');if(xi)xi.value=Math.round(m.x);if(yi)yi.value=Math.round(m.y);}
function refreshPanel(m){const s=document.getElementById('p_size');if(s){s.value=m.size;document.getElementById('p_sizeV').textContent=m.size;}}
function liveText(m){const el=label.querySelector(`[data-id="${m.id}"]`);if(!el)return;[...el.childNodes].forEach(n=>{if(n.nodeType===3)n.remove();});el.insertBefore(document.createTextNode(m.text),el.firstChild);}
function styleLive(m){const el=label.querySelector(`[data-id="${m.id}"]`);if(!el)return;el.style.fontSize=m.size+'px';el.style.letterSpacing=m.ls+'px';el.style.lineHeight=m.lh;el.style.color=m.color;}

function addText(){
  const id='t'+Date.now();
  model.push({id,type:'text',text:'New text',x:300,y:400,size:54,weight:800,color:'#003DA5',font:'"Archivo", Arial',ls:0,lh:1.1,align:'left',name:'Text Layer'});
  build();select(id);
}
function delLayer(id){model=model.filter(m=>m.id!==id);sel=null;build();renderPanel();}
function toggleOutlines(){outlines=!outlines;document.getElementById('outlineBtn').textContent='Outlines: '+(outlines?'On':'Off');build();}
function normalize(){model.forEach(m=>{if(m.type==='text'&&m.boldW===undefined)m.boldW=(+m.weight>=700?+m.weight:700);});}
function resetAll(){if(confirm('Reset all layers to the original label?')){model=JSON.parse(JSON.stringify(DEFAULTS));normalize();sel=null;build();renderPanel();}}

// ---------- EXPORT ----------
async function exportPNG(){
  const prevSel=sel; deselect();
  document.querySelectorAll('.layer').forEach(e=>e.classList.remove('show-outline'));
  const prevTransform=stage.style.transform; stage.style.transform='none';
  await new Promise(r=>setTimeout(r,60));
  try{
    const canvas=await html2canvas(label,{backgroundColor:null,scale:1,width:1916,height:821,useCORS:true,logging:false});
    const a=document.createElement('a');a.download='axiom-labz-label.png';a.href=canvas.toDataURL('image/png');a.click();
  }catch(err){alert('Export failed: '+err.message);}
  stage.style.transform=prevTransform; fit(); if(outlines)build(); if(prevSel)select(prevSel);
}

// ---------- FIT / SCALE ----------
function fit(){
  const availW=stageWrap.clientWidth-48, availH=stageWrap.clientHeight-48;
  const s=Math.min(availW/1916, availH/821, 1);
  stage.style.transform=`scale(${s})`; stage.dataset.scale=s;
  stage.style.width=(1916*s)+'px'; stage.style.height=(821*s)+'px';
}
window.addEventListener('resize',fit);

// init
model=JSON.parse(JSON.stringify(DEFAULTS));
normalize();
build(); fit();
panel.appendChild(emptyNode());
window.addEventListener('keydown',e=>{ if(e.key==='Delete'&&sel){const m=model.find(x=>x.id===sel);if(m&&m.type==='text')delLayer(sel);} });
</script>
</body>
