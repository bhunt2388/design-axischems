<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axis Chems — Label Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,Arial,sans-serif;background:#0d1b2e;color:#e8eef7;min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
.topnav{height:52px;background:#071525;border-bottom:1px solid #1a3050;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;flex-shrink:0}
.nav-back{font-size:12px;color:#7da8d0;text-decoration:none;display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid #1a3050;border-radius:5px;transition:all .15s}
.nav-back:hover{color:#4fb3ff;border-color:#1E7FE8}
.nav-brand{font-weight:800;font-size:14px;letter-spacing:.06em;color:#e8eef7}
.nav-brand em{color:#1E7FE8;font-style:normal}
.nav-meta{font-size:11px;background:#0d1b2e;border:1px solid #1a3050;padding:3px 10px;border-radius:4px;color:#C9A84C;letter-spacing:.08em}
.saved-msg{font-size:12px;color:#22c55e;display:none;font-weight:600}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - 52px)}

/* PANEL */
.panel{width:296px;flex-shrink:0;background:#0d1b2e;border-right:1px solid #1a3050;overflow-y:auto;padding:0}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:#1a3050}
.pi{padding:14px 15px}
.sec-t{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#3d6494;margin:14px 0 8px;font-weight:700;border-top:1px solid #132035;padding-top:12px}
.sec-t.first{border-top:none;margin-top:0;padding-top:0}
label{display:block;font-size:11px;margin:6px 0 3px;color:#5d8ab4}
input,select{width:100%;padding:7px 9px;border-radius:6px;border:1px solid #1a3050;background:#071525;color:#e8eef7;font-size:13px}
select{cursor:pointer}
input[type=number]{text-align:center}
input:focus,select:focus{outline:none;border-color:#1E7FE8}
.row{display:flex;gap:7px;align-items:flex-end;margin-bottom:3px}
.grow{flex:1}.szw{width:62px}.szlbl{font-size:10px;color:#3d6494}
input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:5px;background:#132035;border:none;padding:0;margin:5px 0 3px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#1E7FE8;border:2px solid #071525;cursor:pointer}
.szrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #112035;font-size:12px;color:#8aaccf}
.togrow:last-of-type{border:none}
.tog{width:36px;height:20px;border-radius:20px;background:#132035;position:relative;cursor:pointer;transition:.15s;flex-shrink:0}
.tog::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.4);transition:.15s}
.tog.on{background:#1E7FE8}.tog.on::after{left:18px;background:#fff}
.btn{margin-top:8px;width:100%;padding:9px;border:0;border-radius:6px;background:#1E7FE8;color:#fff;font-weight:700;cursor:pointer;font-size:13px;transition:background .15s}
.btn:hover{background:#3a92f0}
.btn.alt{background:#0d1b2e;border:1px solid #1a3050;color:#7da8d0}
.btn.alt:hover{background:#132035}
.btn.gold{background:#C9A84C;color:#0a0e1a;border:none;font-weight:800}
.btn.gold:hover{background:#d4b472}
small{color:#3d6494;font-size:11px;line-height:1.6;display:block;margin-top:7px}
.tpl-row{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.tpl-nm{flex:1;background:#071525;border:1px solid #1a3050;color:#e8eef7;padding:4px 8px;border-radius:5px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-btn{padding:4px 10px;border-radius:5px;background:#132035;border:1px solid #1a3050;color:#7da8d0;cursor:pointer;font-size:11px;font-weight:700}
.tpl-btn:hover{background:#1a3050;color:#fff}
.tpl-del{padding:4px 8px;border-radius:5px;background:transparent;border:1px solid #3d1515;color:#f87171;cursor:pointer;font-size:11px}
.tpl-del:hover{background:#3d1515}
.tpl-empty{font-size:11px;color:#3d6494;font-style:italic;padding:3px 0}

/* STAGE */
.stage{flex:1;background:#050d18;display:flex;align-items:center;justify-content:center;padding:28px;overflow:auto}
.stage-inner{width:100%;max-width:960px}
svg#lbl{width:100%;height:auto;display:block;border-radius:4px;box-shadow:0 0 0 1px rgba(30,127,232,.1),0 8px 40px rgba(0,0,0,.7)}
</style></head><body>

<div class="topnav">
  <a href="/" class="nav-back">← All Brands</a>
  <div class="nav-brand">AXIS CHEMS <em>—</em> Label Studio</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="nav-meta">1.75″ × 0.75″</span>
    <button class="btn gold" style="margin:0;width:auto;padding:6px 14px;font-size:12px" onclick="saveTpl()">💾 Save Template</button>
    <span class="saved-msg" id="savedMsg">✓ Saved</span>
  </div>
</div>

<div class="wrap">
 <div class="panel"><div class="pi">

  <div class="sec-t first">Saved Templates</div>
  <div id="tplList"><div class="tpl-empty">No templates yet.</div></div>

  <div class="sec-t">Quick Load · Peptide Library</div>
  <select id="preset"><option value="">— Select a compound —</option></select>

  <div class="sec-t">Label Fields</div>

  <div class="row">
    <div class="grow"><label>Product name</label><input id="in_PRODUCT" value="BPC-157"></div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="sz_PRODUCT" min="8" max="400" value="127"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Dose</label><input id="in_DOSE" value="5 MG"></div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="sz_DOSE" min="8" max="400" value="60"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Purity badge</label><input id="in_PURITY" value="99% PURE"></div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="sz_PURITY" min="8" max="400" value="29"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Disclaimer</label><input id="in_DISCLAIMER" value="FOR RESEARCH USE ONLY"></div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="sz_DISCLAIMER" min="8" max="400" value="35"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Batch line</label><input id="in_BATCH" value="BATCH NO:"></div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="sz_META" min="8" max="400" value="33"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Expiry line</label><input id="in_EXPIRY" value="EXPIRY DATE:"></div>
    <div class="szw"><label class="szlbl">px</label><span style="display:block;height:34px"></span></div>
  </div>

  <div class="sec-t">Logo Overlay</div>
  <div class="row">
    <div class="grow"><label>Size (width px)</label>
      <input id="logo_w_range" type="range" min="50" max="900" value="380" style="margin:4px 0 2px">
    </div>
    <div class="szw"><label class="szlbl">px</label><input type="number" id="logo_w_num" min="50" max="900" value="380"></div>
  </div>
  <div class="row">
    <div class="grow"><label>Rotation (deg)</label>
      <input id="logo_rot_range" type="range" min="-180" max="180" value="0" step="1" style="margin:4px 0 2px">
    </div>
    <div class="szw"><label class="szlbl">deg</label><input type="number" id="logo_rot_num" min="-180" max="180" value="0"></div>
  </div>
  <button class="btn alt" id="btnResetLogo" style="margin-top:6px">Reset Logo</button>

  <div class="sec-t">Overall Scale</div>
  <label>Text scale · <span id="scaleVal">100%</span></label>
  <input type="range" id="scale" min="0.5" max="1.5" step="0.02" value="1">

  <div class="sec-t">Show / Hide</div>
  <div class="togrow"><span>Purity badge</span><div class="tog on" data-show="PURITY"></div></div>
  <div class="togrow"><span>Disclaimer</span><div class="tog on" data-show="DISCLAIMER"></div></div>
  <div class="togrow"><span>Batch line</span><div class="tog on" data-show="BATCH"></div></div>
  <div class="togrow"><span>Expiry line</span><div class="tog on" data-show="EXPIRY"></div></div>

  <div class="sec-t">Export</div>
  <button class="btn" onclick="dl('png')">⬇ Download PNG (print, 3200px)</button>
  <button class="btn alt" onclick="dl('svg')" style="margin-top:6px">⬇ Download SVG (vector)</button>
  <small>Drag text blocks to reposition. Save template to keep your layout.</small>

 </div></div>

<script>
const text={PRODUCT:'in_PRODUCT',DOSE:'in_DOSE',PURITY:'in_PURITY',DISCLAIMER:'in_DISCLAIMER',BATCH:'in_BATCH',EXPIRY:'in_EXPIRY'};
const size={PRODUCT:'sz_PRODUCT',DOSE:'sz_DOSE',PURITY:'sz_PURITY',DISCLAIMER:'sz_DISCLAIMER',BATCH:'sz_META',EXPIRY:'sz_META'};
function sync(){
 for(const k in text) document.getElementById(k).textContent=document.getElementById(text[k]).value;
 for(const k in size){const s=parseFloat(document.getElementById(size[k]).value);if(s>0)document.getElementById(k).style.fontSize=s+'px';}
 fit();
}
function fit(){
 const t=document.getElementById('PRODUCT');
 const base=parseFloat(document.getElementById('sz_PRODUCT').value)||127;
 t.style.fontSize=base+'px';
 const maxW=715,w=t.getBBox().width;
 if(w>maxW) t.style.fontSize=(base*maxW/w).toFixed(1)+'px';
}
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',sync));
sync();
function svgString(){return new XMLSerializer().serializeToString(document.getElementById('lbl'));}
function dl(type){
 const name=(document.getElementById('in_PRODUCT').value||'label').replace(/[^a-z0-9_-]/gi,'_');
 const s=svgString();
 if(type==='svg'){save(new Blob([s],{type:'image/svg+xml'}),name+'.svg');return;}
 const img=new Image(),url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));
 img.onload=()=>{const c=document.createElement('canvas');c.width=3200;c.height=1379;
  const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);
  x.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);
  c.toBlob(b=>save(b,name+'.png'),'image/png');};
 img.src=url;
}
function save(blob,fn){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();}

/* ---- logo overlay controls ---- */
const LOGO_DEF = { x: 1100, y: 140, w: 380, rot: 0 };
const LOGO_ASPECT = 0.238400;
let LOGO_STATE = { ...LOGO_DEF };

function syncLogo() {
  const el = document.getElementById('LOGO');
  const gEl = document.getElementById('gLOGO');
  const w = LOGO_STATE.w;
  const h = w * LOGO_ASPECT;
  el.setAttribute('width', w);
  el.setAttribute('height', h);
  el.setAttribute('x', LOGO_STATE.x);
  el.setAttribute('y', LOGO_STATE.y);
  const cx = LOGO_STATE.x + w / 2;
  const cy = LOGO_STATE.y + h / 2;
  gEl.setAttribute('transform', 'rotate(' + LOGO_STATE.rot + ',' + cx + ',' + cy + ')');
}

function resetLogo() {
  LOGO_STATE = { ...LOGO_DEF };
  document.getElementById('logo_w_range').value = LOGO_STATE.w;
  document.getElementById('logo_w_num').value = LOGO_STATE.w;
  document.getElementById('logo_rot_range').value = LOGO_STATE.rot;
  document.getElementById('logo_rot_num').value = LOGO_STATE.rot;
  syncLogo();
}
document.getElementById('btnResetLogo').addEventListener('click', resetLogo);

// Size controls
document.getElementById('logo_w_range').addEventListener('input', function(e) {
  LOGO_STATE.w = parseInt(e.target.value) || 380;
  document.getElementById('logo_w_num').value = LOGO_STATE.w;
  syncLogo();
});
document.getElementById('logo_w_num').addEventListener('input', function(e) {
  const v = Math.min(900, Math.max(50, parseInt(e.target.value) || 380));
  LOGO_STATE.w = v;
  document.getElementById('logo_w_range').value = v;
  syncLogo();
});

// Rotation controls
document.getElementById('logo_rot_range').addEventListener('input', function(e) {
  LOGO_STATE.rot = parseInt(e.target.value) || 0;
  document.getElementById('logo_rot_num').value = LOGO_STATE.rot;
  syncLogo();
});
document.getElementById('logo_rot_num').addEventListener('input', function(e) {
  const v = Math.min(180, Math.max(-180, parseInt(e.target.value) || 0));
  LOGO_STATE.rot = v;
  document.getElementById('logo_rot_range').value = v;
  syncLogo();
});

// Drag to reposition logo
(function() {
  var gEl = document.getElementById('gLOGO');
  gEl.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var sc = svgScale();
    var sx = e.clientX, sy = e.clientY;
    var bx = LOGO_STATE.x, by = LOGO_STATE.y;
    try { gEl.setPointerCapture(e.pointerId); } catch(err) {}
    gEl.style.cursor = 'grabbing';
    function move(ev) {
      LOGO_STATE.x = bx + (ev.clientX - sx) * sc;
      LOGO_STATE.y = by + (ev.clientY - sy) * sc;
      syncLogo();
    }
    function up() {
      gEl.style.cursor = 'grab';
      gEl.removeEventListener('pointermove', move);
      gEl.removeEventListener('pointerup', up);
      gEl.removeEventListener('pointercancel', up);
    }
    gEl.addEventListener('pointermove', move);
    gEl.addEventListener('pointerup', up);
    gEl.addEventListener('pointercancel', up);
  });
})();

syncLogo();
</script>

(function buildCatalog(){
  const ps=document.getElementById('preset'); if(!ps) return;
  ps.appendChild(Object.assign(document.createElement('option'),{value:'__custom__',textContent:'✏️  Custom (type your own)'}));
  Object.entries(CATALOG).forEach(([grp,items])=>{

/* ── ADDED: overall scale slider ── */
let SCALE=1;
(function bindScale(){
  const sl=document.getElementById('scale'); if(!sl)return;
  sl.addEventListener('input',e=>{
    SCALE=parseFloat(e.target.value);
    const pct=Math.round(SCALE*100)+'%';
    const lbl=document.getElementById('scaleVal');if(lbl)lbl.textContent=pct;
    // apply scale to all font sizes
    const sizeFields=['sz_PRODUCT','sz_DOSE','sz_PURITY','sz_DISCLAIMER','sz_META'];
    // size fields already have the base value; re-run sync to pick up SCALE
    sync();
  });
})();

/* ── ADDED: show/hide toggles ── */
const SHOW_STATE={PURITY:true,DISCLAIMER:true,BATCH:true,EXPIRY:true};
(function bindToggles(){
  document.querySelectorAll('.tog').forEach(t=>t.addEventListener('click',()=>{
    t.classList.toggle('on');
    SHOW_STATE[t.dataset.show]=t.classList.contains('on');
    sync();
  }));
})();

/* ── ADDED: template save/load ── */
const TPL_KEY='axischems_tpl_v1';
function captureState(){
  const get=id=>document.getElementById(id)?.value||'';
  return{
    text:{PRODUCT:get('in_PRODUCT'),DOSE:get('in_DOSE'),PURITY:get('in_PURITY'),
      DISCLAIMER:get('in_DISCLAIMER'),BATCH:get('in_BATCH'),EXPIRY:get('in_EXPIRY')},
    sizes:{PRODUCT:get('sz_PRODUCT'),DOSE:get('sz_DOSE'),PURITY:get('sz_PURITY'),
      DISCLAIMER:get('sz_DISCLAIMER'),META:get('sz_META')},
    logoW:get('logo_w_num'), logoRot:get('logo_rot_num'), scale:SCALE,
    show:{...SHOW_STATE}
  };
}
function applyState(s){
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  if(s.text){for(const[k,v]of Object.entries(s.text))set('in_'+k,v);}
  if(s.sizes){set('sz_PRODUCT',s.sizes.PRODUCT||'127');set('sz_DOSE',s.sizes.DOSE||'60');
    set('sz_PURITY',s.sizes.PURITY||'29');set('sz_DISCLAIMER',s.sizes.DISCLAIMER||'35');
    set('sz_META',s.sizes.META||'33');}
  if(s.logoW)set('logo_w_num',s.logoW);
  if(s.logoRot)set('logo_rot_num',s.logoRot);
  SCALE=s.scale||1;const sl=document.getElementById('scale');if(sl)sl.value=SCALE;
  const lbl=document.getElementById('scaleVal');if(lbl)lbl.textContent=Math.round(SCALE*100)+'%';
  if(s.show){Object.assign(SHOW_STATE,s.show);document.querySelectorAll('.tog').forEach(t=>{const k=t.dataset.show;if(k in s.show)t.classList.toggle('on',s.show[k]);});}
  sync();
}
function loadTpls(){try{return JSON.parse(localStorage.getItem(TPL_KEY)||'[]');}catch{return[];}}
function saveTpls2(a){localStorage.setItem(TPL_KEY,JSON.stringify(a));}
function renderTpls(){
  const list=loadTpls(); const el=document.getElementById('tplList');if(!el)return;
  if(!list.length){el.innerHTML='<div class="tpl-empty">No templates yet.</div>';return;}
  el.innerHTML=list.map((t,i)=>`<div class="tpl-row"><span class="tpl-nm">${t.name}</span><button class="tpl-btn" onclick="loadTpl(${i})">Load</button><button class="tpl-del" onclick="delTpl(${i})">✕</button></div>`).join('');
}
function saveTpl(){
  const name=prompt('Template name:',document.getElementById('in_PRODUCT')?.value||'My Label');
  if(!name)return;
  const list=loadTpls();const idx=list.findIndex(t=>t.name===name);
  const entry={name,state:captureState(),saved:new Date().toISOString()};
  if(idx>=0)list[idx]=entry;else list.push(entry);
  saveTpls2(list);renderTpls();
  const m=document.getElementById('savedMsg');if(m){m.style.display='inline';setTimeout(()=>m.style.display='none',2500);}
}
function loadTpl(i){const l=loadTpls();if(l[i])applyState(l[i].state);}
function delTpl(i){const l=loadTpls();l.splice(i,1);saveTpls2(l);renderTpls();}

// Init
renderTpls();
</script>
