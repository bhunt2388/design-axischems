<!doctype html><html><head><meta charset="utf-8"><title>Axis Chems Label Studio</title>
<style>
body{margin:0;font-family:system-ui,Arial;background:#0d1b2e;color:#e8eef7}
header{padding:14px 20px;background:#0B4CB8;font-weight:700;letter-spacing:.5px}
.wrap{display:flex;gap:20px;padding:20px;flex-wrap:wrap}
.panel{background:#13243d;border:1px solid #20406e;border-radius:12px;padding:16px;width:360px}
.row{display:flex;gap:10px;align-items:flex-end;margin-bottom:8px}
.grow{flex:1}
label{display:block;font-size:11px;margin:8px 0 3px;color:#9fb6d6}
input{width:100%;padding:9px 10px;border-radius:8px;border:1px solid #2b4f82;background:#0d1b2e;color:#fff;font-size:15px;box-sizing:border-box}
.szwrap{width:74px}
.sz{text-align:center}
.spacer{display:block;height:38px}
button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:8px;background:#1E7FE8;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
button.alt{background:#23406c}
.stage{flex:1;min-width:340px;background:#fff;border-radius:12px;padding:10px;align-self:flex-start}
svg{width:100%;height:auto;display:block}
small{color:#7e9bc4}
</style></head><body>
<header>AXIS CHEMS — LABEL STUDIO</header>
<div class="wrap">
 <div class="panel">
  <div class="row"><div class="grow"><label>Product name</label><input id="in_PRODUCT" value="BPC-157"></div><div class="szwrap"><label>px</label><input class="sz" id="sz_PRODUCT" type="number" min="8" max="400" value="127" title="font size px"></div></div>
<div class="row"><div class="grow"><label>Dose</label><input id="in_DOSE" value="5 MG"></div><div class="szwrap"><label>px</label><input class="sz" id="sz_DOSE" type="number" min="8" max="400" value="60" title="font size px"></div></div>
<div class="row"><div class="grow"><label>Purity badge</label><input id="in_PURITY" value="99% PURE"></div><div class="szwrap"><label>px</label><input class="sz" id="sz_PURITY" type="number" min="8" max="400" value="29" title="font size px"></div></div>
<div class="row"><div class="grow"><label>Disclaimer</label><input id="in_DISCLAIMER" value="FOR RESEARCH USE ONLY"></div><div class="szwrap"><label>px</label><input class="sz" id="sz_DISCLAIMER" type="number" min="8" max="400" value="35" title="font size px"></div></div>
<div class="row"><div class="grow"><label>Batch line</label><input id="in_BATCH" value="BATCH NO:"></div><div class="szwrap"><label>px</label><input class="sz" id="sz_META" type="number" min="8" max="400" value="33" title="font size px"></div></div>
<div class="row"><div class="grow"><label>Expiry line</label><input id="in_EXPIRY" value="EXPIRY DATE:"></div><div class="szwrap"><label>px</label><span class="sz spacer"></span></div></div>

    <hr style="border:0;border-top:1px solid #20406e;margin:14px 0 10px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <label style="margin:0;color:#4fb3ff;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Logo Overlay</label>

  </div>
  <div class="row">
    <div class="grow">
      <label>Size (width px)</label>
      <input id="logo_w_range" type="range" min="50" max="900" value="380" style="width:100%;padding:0;height:6px;accent-color:#1E7FE8;cursor:pointer">
    </div>
    <div class="szwrap">
      <label>px</label>
      <input class="sz" id="logo_w_num" type="number" min="50" max="900" value="380">
    </div>
  </div>
  <div class="row">
    <div class="grow">
      <label>Rotation (deg)</label>
      <input id="logo_rot_range" type="range" min="-180" max="180" value="0" step="1" style="width:100%;padding:0;height:6px;accent-color:#1E7FE8;cursor:pointer">
    </div>
    <div class="szwrap">
      <label>deg</label>
      <input class="sz" id="logo_rot_num" type="number" min="-180" max="180" value="0">
    </div>
  </div>

<script>
const text={PRODUCT:'in_PRODUCT',DOSE:'in_DOSE',PURITY:'in_PURITY',DISCLAIMER:'in_DISCLAIMER',BATCH:'in_BATCH',EXPIRY:'in_EXPIRY'};
const size={PRODUCT:'sz_PRODUCT',DOSE:'sz_DOSE',PURITY:'sz_PURITY',DISCLAIMER:'sz_DISCLAIMER',BATCH:'sz_META',EXPIRY:'sz_META'};
function sync(){
 for(const k in text) document.getElementById(k).textContent=document.getElementById(text[k]).value;
 for(const k in size){const s=parseFloat(document.getElementById(size[k]).value);if(s>0)document.getElementById(k).style.fontSize=s+'px';}
 fit();
}
function fit(){
 const t=document.getElementById('PRODUCT');
 const base=parseFloat(document.getElementById('sz_PRODUCT').value)||127;
 t.style.fontSize=base+'px';
 const maxW=715,w=t.getBBox().width;
 if(w>maxW) t.style.fontSize=(base*maxW/w).toFixed(1)+'px';
}
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',sync));
sync();
function svgString(){return new XMLSerializer().serializeToString(document.getElementById('lbl'));}
function dl(type){
 const name=(document.getElementById('in_PRODUCT').value||'label').replace(/[^a-z0-9_-]/gi,'_');
 const s=svgString();
 if(type==='svg'){save(new Blob([s],{type:'image/svg+xml'}),name+'.svg');return;}
 const img=new Image(),url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));
 img.onload=()=>{const c=document.createElement('canvas');c.width=3200;c.height=1379;
  const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);
  x.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);
  c.toBlob(b=>save(b,name+'.png'),'image/png');};
 img.src=url;
}
function save(blob,fn){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();}

/* ---- logo overlay controls ---- */
const LOGO_DEF = { x: 1100, y: 140, w: 380, rot: 0 };
const LOGO_ASPECT = 0.238400;
let LOGO_STATE = { ...LOGO_DEF };

function syncLogo() {
  const el = document.getElementById('LOGO');
  const gEl = document.getElementById('gLOGO');
  const w = LOGO_STATE.w;
  const h = w * LOGO_ASPECT;
  el.setAttribute('width', w);
  el.setAttribute('height', h);
  el.setAttribute('x', LOGO_STATE.x);
  el.setAttribute('y', LOGO_STATE.y);
  const cx = LOGO_STATE.x + w / 2;
  const cy = LOGO_STATE.y + h / 2;
  gEl.setAttribute('transform', 'rotate(' + LOGO_STATE.rot + ',' + cx + ',' + cy + ')');
}

function resetLogo() {
  LOGO_STATE = { ...LOGO_DEF };
  document.getElementById('logo_w_range').value = LOGO_STATE.w;
  document.getElementById('logo_w_num').value = LOGO_STATE.w;
  document.getElementById('logo_rot_range').value = LOGO_STATE.rot;
  document.getElementById('logo_rot_num').value = LOGO_STATE.rot;
  syncLogo();
}
document.getElementById('btnResetLogo').addEventListener('click', resetLogo);

// Size controls
document.getElementById('logo_w_range').addEventListener('input', function(e) {
  LOGO_STATE.w = parseInt(e.target.value) || 380;
  document.getElementById('logo_w_num').value = LOGO_STATE.w;
  syncLogo();
});
document.getElementById('logo_w_num').addEventListener('input', function(e) {
  const v = Math.min(900, Math.max(50, parseInt(e.target.value) || 380));
  LOGO_STATE.w = v;
  document.getElementById('logo_w_range').value = v;
  syncLogo();
});

// Rotation controls
document.getElementById('logo_rot_range').addEventListener('input', function(e) {
  LOGO_STATE.rot = parseInt(e.target.value) || 0;
  document.getElementById('logo_rot_num').value = LOGO_STATE.rot;
  syncLogo();
});
document.getElementById('logo_rot_num').addEventListener('input', function(e) {
  const v = Math.min(180, Math.max(-180, parseInt(e.target.value) || 0));
  LOGO_STATE.rot = v;
  document.getElementById('logo_rot_range').value = v;
  syncLogo();
});

// Drag to reposition logo
(function() {
  var gEl = document.getElementById('gLOGO');
  gEl.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var sc = svgScale();
    var sx = e.clientX, sy = e.clientY;
    var bx = LOGO_STATE.x, by = LOGO_STATE.y;
    try { gEl.setPointerCapture(e.pointerId); } catch(err) {}
    gEl.style.cursor = 'grabbing';
    function move(ev) {
      LOGO_STATE.x = bx + (ev.clientX - sx) * sc;
      LOGO_STATE.y = by + (ev.clientY - sy) * sc;
      syncLogo();
    }
    function up() {
      gEl.style.cursor = 'grab';
      gEl.removeEventListener('pointermove', move);
      gEl.removeEventListener('pointerup', up);
      gEl.removeEventListener('pointercancel', up);
    }
    gEl.addEventListener('pointermove', move);
    gEl.addEventListener('pointerup', up);
    gEl.addEventListener('pointercancel', up);
  });
})();

syncLogo();
</script></body></html>
