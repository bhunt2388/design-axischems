<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axis Chems — Label Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--hi:#1E7FE8;--panel:#11161c;--panel2:#1a222c;--line:#252f3d;--txt:#e7edf4;--muted:#6a8aaa;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Inter',Arial,sans-serif;background:#0a0e13;color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
#bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap}
#bar .brand{font-weight:900;font-size:14px;letter-spacing:.04em;margin-right:4px}
#bar .brand span{color:var(--hi)}
a.back{font-size:12px;color:var(--muted);text-decoration:none;padding:6px 11px;border:1px solid var(--line);border-radius:6px;transition:.12s}
a.back:hover{color:var(--hi);border-color:var(--hi)}
button{font-family:inherit;font-weight:700;font-size:12px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);padding:7px 12px;border-radius:7px;cursor:pointer;transition:.12s}
button:hover{background:#1e2c3a;border-color:#3a5068}
button.primary{background:var(--hi);border-color:var(--hi);color:#fff}
button.primary:hover{filter:brightness(1.1)}
button.gold{background:#C9A84C;border-color:#C9A84C;color:#0a0e13}
button.gold:hover{background:#d4b472}
.sp{flex:1}
.hint{font-size:11px;color:var(--muted)}
#qbar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:#0a0e13;border-bottom:1px solid var(--line);flex-shrink:0}
#qbar label{font-size:11px;color:var(--muted);white-space:nowrap}
#preset{background:#090f17;border:1px solid var(--line);color:var(--txt);padding:6px 9px;border-radius:6px;font-family:inherit;font-size:12px;flex:1;max-width:460px;cursor:pointer}
#main{flex:1;display:flex;min-height:0}
#stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;background:radial-gradient(circle at 50% 30%,#131a22,#0a0e13)}
#stage{transform-origin:center center}
#label{position:relative;width:1600px;height:689px;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.7);user-select:none}
#labelBg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:block}
.layer{position:absolute;cursor:move;line-height:1.15;outline:1px dashed transparent;user-select:none;white-space:nowrap}
.layer.outlines{outline-color:rgba(30,127,232,.35)}
.layer.sel{outline:2px solid var(--hi)!important;outline-offset:3px}
.layer[contenteditable=true]{cursor:text;outline:2px solid #2bd673!important;caret-color:#2bd673}
.locked{position:absolute;cursor:move;outline:1px dashed transparent}
.locked.outlines{outline-color:rgba(201,168,76,.3)}
.locked.sel{outline:2px solid #C9A84C!important;outline-offset:2px}
.locked img{display:block;pointer-events:none}
.lock-badge{position:absolute;top:-11px;left:0;background:#0b1722;border:1px solid #C9A84C;color:#C9A84C;font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px;display:none;white-space:nowrap;z-index:8}
.sel .lock-badge{display:block}
.handle{position:absolute;width:14px;height:14px;background:var(--hi);border:2px solid #fff;border-radius:50%;right:-7px;bottom:-7px;cursor:nwse-resize;display:none;z-index:9}
.sel .handle{display:block}
#panel{width:292px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
#panel::-webkit-scrollbar{width:4px}#panel::-webkit-scrollbar-thumb{background:var(--line)}
.pg{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px}
.pg h4{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;font-weight:700}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.row label{font-size:11px;color:var(--muted);width:66px;flex-shrink:0}
.row input[type=text],.row textarea,.row select,.row input[type=number]{flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px}
.row textarea{resize:vertical;min-height:50px;line-height:1.3}
.row input[type=range]{flex:1;accent-color:var(--hi)}
.row input[type=color]{width:34px;height:26px;border:1px solid var(--line);background:none;border-radius:5px;cursor:pointer;padding:2px}
.empty-msg{color:var(--muted);font-size:12px;text-align:center;padding:24px 8px;line-height:1.7}
.lock-note{display:inline-block;background:#0b1722;border:1px solid #C9A84C;color:#C9A84C;font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px;margin-left:4px}
.tpl-row{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.tpl-nm{flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);padding:4px 7px;border-radius:5px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-load{padding:4px 10px;border-radius:5px;background:rgba(30,127,232,.15);border:1px solid rgba(30,127,232,.3);color:var(--hi);cursor:pointer;font-size:11px;font-weight:700}
.tpl-del{padding:4px 8px;border-radius:5px;background:transparent;border:1px solid rgba(185,28,28,.3);color:#f87171;cursor:pointer;font-size:11px}
.tpl-empty{font-size:11px;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<div id="bar">
  <a href="/" class="back">&#8592; All Brands</a>
  <div class="brand">AXIS <span>CHEMS</span> &middot; Label Studio</div>
  <button onclick="addText()">+ Text</button>
  <button id="outlineBtn" onclick="toggleOutlines()">Outlines: On</button>
  <button onclick="resetAll()">Reset</button>
  <div class="sp"></div>
  <span class="hint">Drag &middot; Double-click to edit &middot; Corner dot to scale</span>
  <button class="gold" onclick="saveTpl()">&#128190; Save Template</button>
  <button class="primary" onclick="exportPNG()">&#8595; Export PNG</button>
</div>
<div id="qbar">

  <select id="preset"><option value="">&#8212; Select compound &#8212;</option></select>

function addLayer(cfg) {
  const el = document.createElement('div');
  el.dataset.id = cfg.id;
  el.style.left = cfg.x + 'px';
  el.style.top  = cfg.y + 'px';

  if (cfg.type === 'img') {
    el.className = 'locked' + (outlines ? ' outlines' : '');
    el.style.width  = cfg.w + 'px';
    el.style.height = cfg.h + 'px';
    const img = document.createElement('img');
    img.src = cfg.src;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block';
    el.appendChild(img);
    const badge = document.createElement('div');
    badge.className = 'lock-badge'; badge.textContent = 'LOCKED';
    el.appendChild(badge);
  } else {
    el.className = 'layer' + (outlines ? ' outlines' : '');
    el.style.fontSize   = (cfg.fs || 60) + 'px';
    el.style.fontWeight = cfg.fw || '700';
    el.style.fontFamily = cfg.ff || 'system-ui,Arial,sans-serif';
    el.style.color      = cfg.color || '#000';
    if (cfg.ls) el.style.letterSpacing = cfg.ls;
    el.textContent      = cfg.text || 'New Text';
    const h = document.createElement('div');
    h.className = 'handle'; el.appendChild(h);
    bindResize(el, h);
    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      el.contentEditable = true; el.focus();
      document.execCommand('selectAll', false, null);
    });
    el.addEventListener('blur', () => { el.contentEditable = false; });
    el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } });
  }

  bindDrag(el);
  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('handle')) return;
    select(el);
  });
  label.appendChild(el);
  layers.push({ el, cfg });
  return el;
}

function bindDrag(el) {
  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('handle')) return;
    if (el.contentEditable === 'true') return;
    e.preventDefault();
    const scale = LW / label.getBoundingClientRect().width;
    const ox = parseFloat(el.style.left), oy = parseFloat(el.style.top);
    const sx = e.clientX, sy = e.clientY;
    try { el.setPointerCapture(e.pointerId); } catch(_) {}
    const mv = ev => {
      el.style.left = Math.max(0, ox + (ev.clientX-sx)*scale) + 'px';
      el.style.top  = Math.max(0, oy + (ev.clientY-sy)*scale) + 'px';
      if (sel===el) syncPos();
    };
    const up = () => {
      try { el.releasePointerCapture(e.pointerId); } catch(_) {}
      el.removeEventListener('pointermove', mv);
      el.removeEventListener('pointerup', up);
    };
    el.addEventListener('pointermove', mv);
    el.addEventListener('pointerup', up);
  });
}

function bindResize(el, handle) {
  handle.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    const scale = LW / label.getBoundingClientRect().width;
    const sx = e.clientX, sy = e.clientY;
    const startFs = parseFloat(el.style.fontSize) || 60;
    try { handle.setPointerCapture(e.pointerId); } catch(_) {}
    const mv = ev => {
      const newFs = Math.max(8, startFs + (ev.clientY-sy)*scale*0.35);
      el.style.fontSize = newFs + 'px';
      const fi=document.getElementById('p_fs'); if(fi) fi.value=Math.round(newFs);
      const fr=document.getElementById('p_fs_r'); if(fr) fr.value=Math.round(newFs);
    };
    const up = () => {
      handle.removeEventListener('pointermove', mv);
      handle.removeEventListener('pointerup', up);
    };
    handle.addEventListener('pointermove', mv);
    handle.addEventListener('pointerup', up);
  });
}

function select(el) {
  if (sel) sel.classList.remove('sel');
  sel = el; el.classList.add('sel');
  buildPanel();
}
label.addEventListener('pointerdown', e => {
  if (e.target === label || e.target.id === 'labelBg') {
    if (sel) { sel.classList.remove('sel'); sel = null; }
    showEmpty();
  }
});
function showEmpty() { panelEl.innerHTML = ''; panelEl.appendChild(emptyMsg); renderTplSection(); }
function syncPos() {
  const xi=document.getElementById('p_x'); if(xi&&sel) xi.value=Math.round(parseFloat(sel.style.left));
  const yi=document.getElementById('p_y'); if(yi&&sel) yi.value=Math.round(parseFloat(sel.style.top));
}

function buildPanel() {
  if (!sel) { showEmpty(); return; }
  panelEl.innerHTML = '';
  const lyr = layers.find(l => l.el === sel);
  if (!lyr) return;
  const isImg = lyr.cfg.type === 'img';

  // Position
  const pos = pg('Position');
  pos.appendChild(row('X', numI('p_x', Math.round(parseFloat(sel.style.left)), v => sel.style.left=v+'px')));
  pos.appendChild(row('Y', numI('p_y', Math.round(parseFloat(sel.style.top)),  v => sel.style.top=v+'px')));
  panelEl.appendChild(pos);

  if (isImg) {
    const sz = pg('Size');
    sz.querySelector('h4').innerHTML = 'Size <span class="lock-note">LOCKED</span>';
    sz.appendChild(row('Width',  numI('p_iw', Math.round(parseFloat(sel.style.width)),  v => sel.style.width=v+'px',  50, 1600)));
    sz.appendChild(row('Height', numI('p_ih', Math.round(parseFloat(sel.style.height)), v => sel.style.height=v+'px', 10, 800)));
    panelEl.appendChild(sz);
    renderTplSection(); return;
  }

  // Text
  const txtPg = pg('Text');
  const ta = document.createElement('textarea');
  const rawTxt = Array.from(sel.childNodes).filter(n => n.nodeType===3).map(n=>n.nodeValue).join('') || sel.textContent.trim();
  ta.value = rawTxt;
  ta.style.cssText='width:100%;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px;resize:vertical;min-height:50px';
  ta.addEventListener('input', () => {
    const h = sel.querySelector('.handle');
    sel.textContent = ta.value;
    if (h) sel.appendChild(h);
  });
  txtPg.appendChild(ta);
  panelEl.appendChild(txtPg);

  // Typography
  const typo = pg('Typography');

  // Font size
  const fsDiv = document.createElement('div'); fsDiv.className='row';
  const fsLbl = document.createElement('label'); fsLbl.textContent='Size';
  const fsCur = Math.round(parseFloat(sel.style.fontSize)||60);
  const fsR = document.createElement('input'); fsR.type='range'; fsR.id='p_fs_r'; fsR.min=8; fsR.max=300; fsR.value=fsCur; fsR.style.flex='1';
  const fsN = document.createElement('input'); fsN.type='number'; fsN.id='p_fs'; fsN.min=8; fsN.max=300; fsN.value=fsCur; fsN.style.width='50px'; fsN.style.flex='none';
  const fsSync = v => { sel.style.fontSize=v+'px'; fsR.value=v; fsN.value=v; };
  fsR.addEventListener('input', () => fsSync(fsR.value));
  fsN.addEventListener('input', () => fsSync(fsN.value));
  fsDiv.appendChild(fsLbl); fsDiv.appendChild(fsR); fsDiv.appendChild(fsN);
  typo.appendChild(fsDiv);

  typo.appendChild(row('Weight', selI('p_fw',
    ['400','500','600','700','800','900'],['Regular','Medium','Semi','Bold','ExtraBold','Black'],
    sel.style.fontWeight||'700', v=>sel.style.fontWeight=v)));

  const fonts = [
    ["system-ui,'Arial Black',Arial,sans-serif","Default"],
    ["'Inter',system-ui,Arial,sans-serif","Inter"],
    ["Arial,sans-serif","Arial"],
    ["Helvetica,Arial,sans-serif","Helvetica"],
    ["'Arial Black',Arial,sans-serif","Arial Black"],
    ["Impact,sans-serif","Impact"],
    ["Verdana,sans-serif","Verdana"],
    ["'Courier New',monospace","Courier New"],
    ["Georgia,serif","Georgia"],
    ["'Times New Roman',serif","Times New Roman"],
  ];
  typo.appendChild(row('Font', selI('p_ff', fonts.map(f=>f[0]), fonts.map(f=>f[1]),
    sel.style.fontFamily||fonts[0][0], v=>sel.style.fontFamily=v)));

  const colDiv=document.createElement('div'); colDiv.className='row';
  const colLbl=document.createElement('label'); colLbl.textContent='Color';
  const colI=document.createElement('input'); colI.type='color'; colI.value=rgb2hex(sel.style.color)||'#000000';
  colI.addEventListener('input',()=>sel.style.color=colI.value);
  colDiv.appendChild(colLbl); colDiv.appendChild(colI); typo.appendChild(colDiv);

  typo.appendChild(row('Spacing', numI('p_ls', parseFloat(sel.style.letterSpacing)||0, v=>sel.style.letterSpacing=v+'px', -10,60,0.5)));
  panelEl.appendChild(typo);

  // Actions
  const acts=pg('Actions');
  const dupBtn=document.createElement('button'); dupBtn.textContent='Duplicate'; dupBtn.style.width='100%';
  dupBtn.addEventListener('click',()=>{
    const c2=Object.assign({},lyr.cfg,{id:++uid,x:parseFloat(sel.style.left)+20,y:parseFloat(sel.style.top)+20,
      text:ta.value,fs:parseFloat(sel.style.fontSize),fw:sel.style.fontWeight,ff:sel.style.fontFamily,color:sel.style.color});
    select(addLayer(c2));
  });
  const delBtn=document.createElement('button'); delBtn.textContent='Delete';
  delBtn.style.cssText='width:100%;margin-top:6px;color:#f87171;background:rgba(185,28,28,.1);border-color:rgba(185,28,28,.3)';
  delBtn.addEventListener('click',()=>{layers=layers.filter(l=>l.el!==sel);sel.remove();sel=null;showEmpty();});
  acts.appendChild(dupBtn); acts.appendChild(delBtn);
  panelEl.appendChild(acts);
  renderTplSection();
}

// helpers
function pg(title){const g=document.createElement('div');g.className='pg';g.innerHTML='<h4>'+title+'</h4>';return g;}
function row(lbl,input){const r=document.createElement('div');r.className='row';const l=document.createElement('label');l.textContent=lbl;r.appendChild(l);r.appendChild(input);return r;}
function numI(id,val,cb,min,max,step){const i=document.createElement('input');i.type='number';i.id=id;i.value=val;if(min!=null)i.min=min;if(max!=null)i.max=max;if(step)i.step=step;i.style.flex='1';i.addEventListener('input',()=>cb(parseFloat(i.value)||0));return i;}
function selI(id,vals,labels,cur,cb){const s=document.createElement('select');s.id=id;s.style.flex='1';vals.forEach((v,i)=>{const o=document.createElement('option');o.value=v;o.textContent=labels[i];if(v===cur||v.replace(/'/g,'')===cur.replace(/'/g,''))o.selected=true;s.appendChild(o);});s.addEventListener('change',()=>cb(s.value));return s;}
function rgb2hex(c){if(!c)return'#000000';if(c.startsWith('#'))return c;const m=c.match(/\d+/g);if(!m)return'#000000';return'#'+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,'0')).join('');}

function toggleOutlines(){outlines=!outlines;document.getElementById('outlineBtn').textContent='Outlines: '+(outlines?'On':'Off');layers.forEach(l=>l.el.classList.toggle('outlines',outlines));}
function addText(){const el=addLayer({type:'text',text:'New Text',x:200,y:300,fs:80,fw:'700',ff:"system-ui,Arial,sans-serif",color:'#0a0e1a',id:++uid});select(el);}
function resetAll(){layers.forEach(l=>l.el.remove());layers=[];sel=null;uid=0;showEmpty();buildDefault();fitLabel();}

document.addEventListener('keydown',e=>{
  if(!sel||sel.contentEditable==='true')return;
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const s=e.shiftKey?10:1;
  if(e.key==='ArrowLeft'){e.preventDefault();sel.style.left=(parseFloat(sel.style.left)-s)+'px';syncPos();}
  if(e.key==='ArrowRight'){e.preventDefault();sel.style.left=(parseFloat(sel.style.left)+s)+'px';syncPos();}
  if(e.key==='ArrowUp'){e.preventDefault();sel.style.top=(parseFloat(sel.style.top)-s)+'px';syncPos();}
  if(e.key==='ArrowDown'){e.preventDefault();sel.style.top=(parseFloat(sel.style.top)+s)+'px';syncPos();}
  if(e.key==='Delete'||e.key==='Backspace'){layers=layers.filter(l=>l.el!==sel);sel.remove();sel=null;showEmpty();}
  if(e.key==='Escape'){sel.classList.remove('sel');sel=null;showEmpty();}
});

function fitLabel(){const r=stageWrap.getBoundingClientRect();const s=Math.min((r.width-48)/LW,(r.height-48)/LH,1);stageEl.style.transform='scale('+s+')';stageEl.style.width=LW+'px';stageEl.style.height=LH+'px';}
window.addEventListener('resize',fitLabel);

const TPL_KEY='axischems_studio_v2';
function captureLayers(){return layers.map(l=>{const el=l.el,c=l.cfg;const b={type:c.type,locked:!!c.locked,id:c.id,x:parseFloat(el.style.left),y:parseFloat(el.style.top)};if(c.type==='img'){b.src=c.src;b.w=parseFloat(el.style.width);b.h=parseFloat(el.style.height);}else{b.text=el.textContent.trim();b.fs=parseFloat(el.style.fontSize);b.fw=el.style.fontWeight;b.ff=el.style.fontFamily;b.color=el.style.color;b.ls=el.style.letterSpacing;}return b;});}
function loadTpls(){try{return JSON.parse(localStorage.getItem(TPL_KEY)||'[]');}catch{return[];}}
function saveTpls2(a){localStorage.setItem(TPL_KEY,JSON.stringify(a));}
function saveTpl(){const name=prompt('Template name:',layers.find(l=>l.cfg.type!=='img')?.el.textContent.trim()||'My Label');if(!name)return;const list=loadTpls();const idx=list.findIndex(t=>t.name===name);const entry={name,state:captureLayers(),saved:new Date().toISOString()};if(idx>=0)list[idx]=entry;else list.push(entry);saveTpls2(list);renderTplSection();const btn=document.querySelector('#bar button.gold');const orig=btn.textContent;btn.textContent='✓ Saved!';setTimeout(()=>btn.textContent=orig,2000);}
function loadTpl(i){const list=loadTpls();if(!list[i])return;layers.forEach(l=>l.el.remove());layers=[];sel=null;uid=0;list[i].state.forEach(cfg=>{if(cfg.id>uid)uid=cfg.id;addLayer(cfg);});showEmpty();fitLabel();}
function delTpl(i){const l=loadTpls();l.splice(i,1);saveTpls2(l);renderTplSection();}
function renderTplSection(){const prev=document.getElementById('tplSec');if(prev)prev.remove();const list=loadTpls();const sec=pg('Saved Templates');sec.id='tplSec';if(!list.length){const e=document.createElement('div');e.className='tpl-empty';e.textContent='No templates yet.';sec.appendChild(e);}else list.forEach((t,i)=>{const r=document.createElement('div');r.className='tpl-row';r.innerHTML='<span class="tpl-nm">'+t.name+'</span><button class="tpl-load" onclick="loadTpl('+i+')">Load</button><button class="tpl-del" onclick="delTpl('+i+')">&#x2715;</button>';sec.appendChild(r);});panelEl.insertBefore(sec,panelEl.firstChild);}

const CATALOG={"Water / Diluents":[["Bacteriostatic Water","30ml","STERILE SOLUTION"],["Sterile Water","30ml","STERILE SOLUTION"],["Sodium Chloride 0.9%","30ml","STERILE SOLUTION"]],"Metabolic / GLP-1":[["Semaglutide","5 MG","LYOPHILIZED POWDER"],["Tirzepatide","10 MG","LYOPHILIZED POWDER"],["Retatrutide","10 MG","LYOPHILIZED POWDER"],["Cagrilintide","5 MG","LYOPHILIZED POWDER"],["Survodutide","10 MG","LYOPHILIZED POWDER"],["Liraglutide","5 MG","LYOPHILIZED POWDER"],["AOD-9604","5 MG","LYOPHILIZED POWDER"],["MOTS-c","10 MG","LYOPHILIZED POWDER"],["5-Amino-1MQ","50 MG","LYOPHILIZED POWDER"],["Tesofensine","500 MCG","LYOPHILIZED POWDER"],["SLU-PP-332","10 MG","LYOPHILIZED POWDER"]],"Growth Hormone Secretagogues":[["CJC-1295","5 MG","LYOPHILIZED POWDER"],["CJC-1295 (No DAC)","5 MG","LYOPHILIZED POWDER"],["CJC-1295 / Ipamorelin","5/5 MG","LYOPHILIZED POWDER"],["Ipamorelin","5 MG","LYOPHILIZED POWDER"],["Sermorelin","5 MG","LYOPHILIZED POWDER"],["Tesamorelin","10 MG","LYOPHILIZED POWDER"],["Hexarelin","5 MG","LYOPHILIZED POWDER"],["GHRP-2","5 MG","LYOPHILIZED POWDER"],["GHRP-6","5 MG","LYOPHILIZED POWDER"],["MK-677 (Ibutamoren)","25 MG","LYOPHILIZED POWDER"],["HGH Fragment 176-191","5 MG","LYOPHILIZED POWDER"],["IGF-1 LR3","1 MG","LYOPHILIZED POWDER"],["IGF-1 DES","1 MG","LYOPHILIZED POWDER"]],"Healing / Recovery":[["BPC-157","5 MG","LYOPHILIZED POWDER"],["TB-500","5 MG","LYOPHILIZED POWDER"],["BPC-157 / TB-500","5/5 MG","LYOPHILIZED POWDER"],["GHK-Cu","50 MG","LYOPHILIZED POWDER"],["KPV","5 MG","LYOPHILIZED POWDER"],["ARA-290","4 MG","LYOPHILIZED POWDER"],["VIP","5 MG","LYOPHILIZED POWDER"],["Pentosan Polysulfate","100 MG","LYOPHILIZED POWDER"]],"Cognitive / Nootropic":[["Semax","30 MG","LYOPHILIZED POWDER"],["Selank","10 MG","LYOPHILIZED POWDER"],["Dihexa","5 MG","LYOPHILIZED POWDER"],["P21","5 MG","LYOPHILIZED POWDER"]],"Longevity / Anti-Aging":[["Epitalon","10 MG","LYOPHILIZED POWDER"],["NAD+","500 MG","LYOPHILIZED POWDER"],["SS-31","10 MG","LYOPHILIZED POWDER"],["Glutathione","600 MG","LYOPHILIZED POWDER"]],"Sexual Health":[["PT-141","10 MG","LYOPHILIZED POWDER"],["Oxytocin","2 MG","LYOPHILIZED POWDER"],["Gonadorelin","2 MG","LYOPHILIZED POWDER"],["Melanotan II","10 MG","LYOPHILIZED POWDER"]],"Immune":[["Thymosin Alpha-1","5 MG","LYOPHILIZED POWDER"],["Thymulin","10 MG","LYOPHILIZED POWDER"],["LL-37","5 MG","LYOPHILIZED POWDER"]],"Sleep / Other":[["DSIP","5 MG","LYOPHILIZED POWDER"],["Adipotide","10 MG","LYOPHILIZED POWDER"],["Follistatin-344","1 MG","LYOPHILIZED POWDER"]]};
(function(){const ps=document.getElementById('preset');const c=document.createElement('option');c.value='__c__';c.textContent='Custom (type your own)';ps.appendChild(c);Object.entries(CATALOG).forEach(([g,items])=>{const og=document.createElement('optgroup');og.label=g;items.forEach(([n,d,form])=>{const o=document.createElement('option');o.value=JSON.stringify([n,d,form]);o.textContent=n+' \u00b7 '+d;og.appendChild(o);});ps.appendChild(og);});ps.addEventListener('change',e=>{const v=e.target.value;if(!v||v==='__c__')return;const [name,dose,form]=JSON.parse(v);const texts=layers.filter(l=>l.cfg.type!=='img');if(texts[0]){const h=texts[0].el.querySelector('.handle');texts[0].el.textContent=name.toUpperCase();if(h)texts[0].el.appendChild(h);}if(texts[1]){const h=texts[1].el.querySelector('.handle');texts[1].el.textContent=dose;if(h)texts[1].el.appendChild(h);}const footer=texts.find(l=>l.el.style.color==='rgb(255, 255, 255)');if(footer){const h=footer.el.querySelector('.handle');footer.el.textContent=form;if(h)footer.el.appendChild(h);}if(sel)buildPanel();e.target.value='';});})();

function exportPNG(){const prev=sel;if(sel){sel.classList.remove('sel');sel=null;}const po=outlines;if(outlines)toggleOutlines();html2canvas(label,{scale:2,width:LW,height:LH,backgroundColor:null,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{const name=(layers.find(l=>l.cfg.type!=='img')?.el.textContent.trim()||'axis-label').replace(/[^a-z0-9_\-]/gi,'_');const a=document.createElement('a');a.download=name+'.png';a.href=canvas.toDataURL('image/png');a.click();if(!po)toggleOutlines();if(prev)select(prev);});}

buildDefault(); fitLabel(); showEmpty();
