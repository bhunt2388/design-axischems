<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axis Chems — Label Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--hi:#1E7FE8;--panel:#0d1520;--panel2:#111d2e;--line:#1a2d42;--txt:#e8f0f8;--muted:#6a8aaa;--gold:#C9A84C}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Inter',Arial,sans-serif;background:#0a0e13;color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap}
#barlabel{font-weight:800;font-size:13px;letter-spacing:.06em;margin-right:4px}
.tb-back{color:var(--muted);text-decoration:none;font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:6px}
.tb-back:hover{color:var(--txt);border-color:var(--muted)}
button{font-family:inherit;font-weight:700;font-size:12px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);padding:7px 12px;border-radius:7px;cursor:pointer;transition:.12s}
button:hover{background:#1e2c3a;border-color:#3a5068}
button.primary{background:var(--hi);border-color:var(--hi);color:#fff}
button.primary:hover{background:#1a6fd4}
button.gold{background:var(--gold);border-color:var(--gold);color:#0a0e13}
button.gold:hover{background:#d4b472}
#barinfo{margin-left:auto;font-size:11px;color:var(--muted)}
#qbar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:#0a0e13;border-bottom:1px solid var(--line);flex-shrink:0}
#qbar label{font-size:11px;color:var(--muted);white-space:nowrap}
#preset{background:#090f17;border:1px solid var(--line);color:var(--txt);padding:6px 9px;border-radius:6px;font-family:inherit;font-size:12px;flex:1;max-width:460px;cursor:pointer}
#main{flex:1;display:flex;overflow:hidden}
#stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;background:radial-gradient(circle at 50% 30%,#131a22,#0a0e13)}
#stage{transform-origin:center center}
#label{position:relative;width:1600px;height:689px;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.7);user-select:none;cursor:default}
#labelBg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:block}
.layer{position:absolute;cursor:move;line-height:1.15;outline:1px dashed transparent;user-select:none;white-space:nowrap}
.layer.outlines{outline-color:rgba(30,127,232,.35)}
.layer.sel{outline:2px solid var(--hi)!important;outline-offset:2px}
.layer.sel .handle{display:block}
.handle{position:absolute;width:14px;height:14px;background:var(--hi);border:2px solid #fff;border-radius:50%;right:-7px;bottom:-7px;cursor:nwse-resize;display:none;z-index:9}
.locked{position:absolute;cursor:default;outline:1px dashed transparent;pointer-events:none}
.locked img{display:block;width:100%;height:100%;object-fit:contain}
#panel{width:292px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
#panel::-webkit-scrollbar{width:4px}#panel::-webkit-scrollbar-thumb{background:var(--line)}
.pg{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px}
.pg h4{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.row label{font-size:11px;color:var(--muted);width:60px;flex-shrink:0}
.row input[type=text],.row textarea,.row select,.row input[type=number]{flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px}
.row textarea{resize:vertical;min-height:48px}
input[type=range]{flex:1;accent-color:var(--hi)}
.row input[type=color]{width:34px;height:26px;border:1px solid var(--line);background:none;border-radius:5px;cursor:pointer;padding:2px}
.tpl-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.tpl-nm{flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);padding:4px 7px;border-radius:5px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-load{padding:4px 10px;border-radius:5px;background:rgba(30,127,232,.15);border:1px solid rgba(30,127,232,.3);color:var(--hi);cursor:pointer;font-size:11px;font-weight:700}
.tpl-del{padding:4px 8px;border-radius:5px;background:transparent;border:1px solid rgba(185,28,28,.3);color:#f87171;cursor:pointer;font-size:11px}
.lock-note{display:inline-block;background:#0b1722;border:1px solid var(--gold);color:var(--gold);font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px;margin-left:4px}
</style>
</head>
<body>
<div id="bar">
  <a href="/" class="tb-back">← All Brands</a>
  <span id="barlabel">AXIS CHEMS</span>
  <button onclick="addText()">+ Text</button>
  <button id="btnOut" onclick="toggleOutlines()">Outlines: On</button>
  <button onclick="resetAll()">Reset</button>
  <button class="gold" onclick="saveTpl()">💾 Save Template</button>
  <button class="primary" onclick="exportPNG()">↓ Export PNG</button>
  <span id="barinfo">Drag · Double-click to edit · Corner dot to scale</span>
</div>
<div id="qbar">

  <select id="preset"><option value="">— Select compound —</option></select>
</div>

function addLayer(cfg){
  const el=document.createElement('div');
  if(cfg.type==='img'){
    const imgEl=document.createElement('div');
    imgEl.className='layer'+(outlines?' outlines':'');
    imgEl.style.position='absolute';
    imgEl.style.left=cfg.x+'px';
    imgEl.style.top=cfg.y+'px';
    imgEl.style.width=cfg.w+'px';
    imgEl.style.height=cfg.h+'px';
    imgEl.style.cursor='move';
    imgEl.style.outline='1px dashed '+(outlines?'rgba(30,127,232,.35)':'transparent');
    imgEl.style.transformOrigin='center center';
    imgEl.style.transform='rotate('+(cfg.rot||0)+'deg)';
    const im=document.createElement('img');
    im.src=cfg.src;
    im.style.cssText='width:100%;height:100%;object-fit:contain;pointer-events:none;display:block;';
    imgEl.appendChild(im);
    const hh=document.createElement('div');hh.className='handle';imgEl.appendChild(hh);
    bindDrag(imgEl);bindImgResize(hh,imgEl,cfg);
    imgEl.addEventListener('pointerdown',function(e){if(!e.target.classList.contains('handle'))select(imgEl);});
    label.appendChild(imgEl);
    layers.push({el:imgEl,cfg:Object.assign({},cfg)});
    return imgEl;
  }
  el.className='layer'+(outlines?' outlines':'');
  el.style.cssText=`left:${cfg.x}px;top:${cfg.y}px;font-size:${cfg.fs}px;font-weight:${cfg.fw};font-family:${cfg.ff};color:${cfg.color};`;
  if(cfg.pill){
    el.style.background=cfg.pillColor||'transparent';
    el.style.border=cfg.pillBorder?`2px solid ${cfg.pillBorder}`:'none';
    el.style.borderRadius='40px';
    el.style.padding='6px 28px';
    el.style.lineHeight='1.2';
  }
  el.textContent=cfg.text;
  const h=document.createElement('div'); h.className='handle'; el.appendChild(h);
  bindDrag(el); bindResize(h,el); bindDblClick(el);
  el.addEventListener('pointerdown',e=>{if(!e.target.classList.contains('handle'))select(el);});
  label.appendChild(el);
  const lyr={el,cfg:{...cfg}};
  layers.push(lyr);
  return el;
}

function bindDrag(el){
  el.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('handle'))return;
    if(el.contentEditable==='true')return;
    e.preventDefault();
    const sc=LW/label.getBoundingClientRect().width;
    const sx=e.clientX,sy=e.clientY,ox=parseFloat(el.style.left)||0,oy=parseFloat(el.style.top)||0;
    try{el.setPointerCapture(e.pointerId);}catch(_){}
    el.style.cursor='grabbing';
    function mv(ev){el.style.left=Math.max(0,ox+(ev.clientX-sx)*sc)+'px';el.style.top=Math.max(0,oy+(ev.clientY-sy)*sc)+'px';}
    function up(){el.style.cursor='move';el.removeEventListener('pointermove',mv);el.removeEventListener('pointerup',up);}
    el.addEventListener('pointermove',mv);el.addEventListener('pointerup',up);
  });
}

function bindResize(h,el){
  h.addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();
    const sc=LW/label.getBoundingClientRect().width;
    const sy=e.clientY,sfs=parseFloat(el.style.fontSize)||60;
    try{h.setPointerCapture(e.pointerId);}catch(_){}
    function mv(ev){el.style.fontSize=Math.max(8,sfs+(ev.clientY-sy)*sc*0.4)+'px';}
    function up(){h.removeEventListener('pointermove',mv);h.removeEventListener('pointerup',up);}
    h.addEventListener('pointermove',mv);h.addEventListener('pointerup',up);
  });
}


function bindImgResize(h,el,cfg){
  h.addEventListener('pointerdown',function(e){
    e.preventDefault();e.stopPropagation();
    var sc=LW/label.getBoundingClientRect().width;
    var sx=e.clientX,sy=e.clientY;
    var sw=parseFloat(el.style.width)||cfg.w;
    var sh=parseFloat(el.style.height)||cfg.h;
    var aspect=sh/sw;
    try{h.setPointerCapture(e.pointerId);}catch(x){}
    function mv(ev){var dx=(ev.clientX-sx)*sc;var nw=Math.max(20,sw+dx);el.style.width=nw+'px';el.style.height=(nw*aspect)+'px';}
    function up(){h.removeEventListener('pointermove',mv);h.removeEventListener('pointerup',up);}
    h.addEventListener('pointermove',mv);h.addEventListener('pointerup',up);
  });
}
function bindDblClick(el){
  el.addEventListener('dblclick',e=>{
    e.stopPropagation();
    el.contentEditable='true';el.focus();
    document.execCommand('selectAll',false,null);
  });
  el.addEventListener('blur',()=>{el.contentEditable='false';const h=el.querySelector('.handle');const txt=Array.from(el.childNodes).filter(n=>n.nodeType===3).map(n=>n.nodeValue).join('').trim();if(h){el.textContent=txt;el.appendChild(h);}});
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}});
}

function select(el){
  if(sel)sel.classList.remove('sel');
  sel=el;el.classList.add('sel');
  buildPanel(el);
}

label.addEventListener('pointerdown',e=>{
  if(e.target===label||e.target.id==='labelBg'){
    if(sel){sel.classList.remove('sel');sel=null;}
    showEmpty();
  }
});

document.addEventListener('keydown',e=>{
  if(!sel||sel.contentEditable==='true')return;
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const step=e.shiftKey?10:1;
  if(e.key==='ArrowLeft') sel.style.left=(parseFloat(sel.style.left)-step)+'px';
  if(e.key==='ArrowRight')sel.style.left=(parseFloat(sel.style.left)+step)+'px';
  if(e.key==='ArrowUp')   sel.style.top =(parseFloat(sel.style.top) -step)+'px';
  if(e.key==='ArrowDown') sel.style.top =(parseFloat(sel.style.top) +step)+'px';
  if(e.key==='Delete'||e.key==='Backspace'){const lyr=layers.find(l=>l.el===sel);if(lyr){sel.remove();layers=layers.filter(l=>l!==lyr);sel=null;showEmpty();}}
  if(e.key==='Escape'){sel.classList.remove('sel');sel=null;showEmpty();}
  e.preventDefault();
});

function showEmpty(){
  document.getElementById('panelEmpty').style.display='';
  document.getElementById('panelEl').style.display='none';
  renderTplList();
}


function buildImgPanel(pe,el,lyr){
  function mkRow(lbl,inp){var r=document.createElement('div');r.className='row';var l=document.createElement('label');l.textContent=lbl;r.appendChild(l);r.appendChild(inp);return r;}
  function numI(val,mn,mx,st,cb){var i=document.createElement('input');i.type='number';i.value=val;i.min=mn;i.max=mx;i.step=st||1;i.style.cssText='flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 7px;font-size:12px';i.addEventListener('input',function(){cb(parseFloat(i.value)||0);});return i;}
  function rngI(val,mn,mx,st,cb){var i=document.createElement('input');i.type='range';i.value=val;i.min=mn;i.max=mx;i.step=st||1;i.style.cssText='flex:1;accent-color:var(--hi)';i.addEventListener('input',function(){cb(parseFloat(i.value));});return i;}
  var curW=parseFloat(el.style.width)||lyr.cfg.w||252;
  var curH=parseFloat(el.style.height)||lyr.cfg.h||620;
  var aspect=curH/curW;
  var curRot=0;
  var rm=(el.style.transform||'').match(/rotate\(([\-\d.]+)deg\)/);
  if(rm)curRot=parseFloat(rm[1]);
  var wN=numI(Math.round(curW),10,1600,2,function(v){el.style.width=v+'px';el.style.height=(v*aspect)+'px';wR.value=v;});
  var wR=rngI(Math.round(curW),10,1600,2,function(v){el.style.width=v+'px';el.style.height=(v*aspect)+'px';wN.value=Math.round(v);});
  var wRow=document.createElement('div');wRow.className='row';
  var wL=document.createElement('label');wL.textContent='Width';
  wRow.appendChild(wL);wRow.appendChild(wR);wRow.appendChild(wN);pe.appendChild(wRow);
  var rotN=numI(curRot,-180,180,1,function(v){el.style.transformOrigin='center center';el.style.transform='rotate('+v+'deg)';rotR.value=v;});
  var rotR=rngI(curRot,-180,180,1,function(v){el.style.transformOrigin='center center';el.style.transform='rotate('+v+'deg)';rotN.value=v;});
  var rotRow=document.createElement('div');rotRow.className='row';
  var rotL=document.createElement('label');rotL.textContent='Rotation';
  rotRow.appendChild(rotL);rotRow.appendChild(rotR);rotRow.appendChild(rotN);pe.appendChild(rotRow);
  var xI=numI(Math.round(parseFloat(el.style.left)||0),-400,1600,1,function(v){el.style.left=v+'px';});
  var yI=numI(Math.round(parseFloat(el.style.top)||0),-400,700,1,function(v){el.style.top=v+'px';});
  pe.appendChild(mkRow('X',xI));pe.appendChild(mkRow('Y',yI));
  var rstBtn=document.createElement('button');rstBtn.textContent='Reset';rstBtn.style.cssText='width:100%;margin-top:8px';
  rstBtn.onclick=function(){
    el.style.left=lyr.cfg.x+'px';el.style.top=lyr.cfg.y+'px';
    el.style.width=lyr.cfg.w+'px';el.style.height=lyr.cfg.h+'px';
    el.style.transform='rotate(0deg)';
    wR.value=lyr.cfg.w;wN.value=lyr.cfg.w;rotR.value=0;rotN.value=0;
    xI.value=Math.round(lyr.cfg.x);yI.value=Math.round(lyr.cfg.y);
  };
  pe.appendChild(rstBtn);
  var note=document.createElement('div');note.style.cssText='font-size:10px;color:var(--muted);margin-top:8px';
  note.textContent='Drag to move · Corner dot = resize · Arrow keys nudge';
  pe.appendChild(note);
}
function buildPanel(el){
  document.getElementById('panelEmpty').style.display='none';
  const pe=document.getElementById('panelEl');
  pe.style.display='';pe.innerHTML='';
  const lyr=layers.find(l=>l.el===el);
  if(!lyr)return;

  pe.innerHTML='<h4>Element</h4>';

  if(lyr.cfg&&lyr.cfg.type==='img'){buildImgPanel(pe,el,lyr);return;}

  // Text textarea
  const ta=document.createElement('textarea');
  ta.value=Array.from(el.childNodes).filter(n=>n.nodeType===3).map(n=>n.nodeValue).join('').trim()||el.textContent.replace(/\s*$/, '').trim();
  ta.style.cssText='width:100%;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px;resize:vertical;min-height:48px;margin-bottom:7px';
  ta.addEventListener('input',()=>{
    const h=el.querySelector('.handle');
    el.textContent=ta.value;
    if(h)el.appendChild(h);
  });
  pe.appendChild(ta);

  function mkRow(lbl,inp){const r=document.createElement('div');r.className='row';const l=document.createElement('label');l.textContent=lbl;r.appendChild(l);r.appendChild(inp);return r;}

  // Font size
  const fsR=document.createElement('input');fsR.type='range';fsR.min=8;fsR.max=220;fsR.value=parseFloat(el.style.fontSize)||60;
  const fsN=document.createElement('input');fsN.type='number';fsN.value=fsR.value;fsN.style.cssText='width:54px;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 6px;font-size:12px';
  fsR.addEventListener('input',()=>{el.style.fontSize=fsR.value+'px';fsN.value=fsR.value;});
  fsN.addEventListener('input',()=>{el.style.fontSize=fsN.value+'px';fsR.value=fsN.value;});
  const fsRow=document.createElement('div');fsRow.className='row';
  const fsL=document.createElement('label');fsL.textContent='Size';
  fsRow.appendChild(fsL);fsRow.appendChild(fsR);fsRow.appendChild(fsN);
  pe.appendChild(fsRow);

  // Font weight
  const fwS=document.createElement('select');
  fwS.style.cssText='flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 7px;font-size:12px';
  [['Thin','100'],['Light','300'],['Regular','400'],['Medium','500'],['Bold','700'],['Black','900']].forEach(([l,v])=>{
    const o=document.createElement('option');o.value=v;o.textContent=l;
    if(el.style.fontWeight===v)o.selected=true;
    fwS.appendChild(o);
  });
  fwS.addEventListener('change',()=>el.style.fontWeight=fwS.value);
  pe.appendChild(mkRow('Weight',fwS));

  // Color
  const colI=document.createElement('input');colI.type='color';
  function rgb2hex(c){if(!c)return'#000000';if(c.startsWith('#'))return c;const m=c.match(/\d+/g);if(!m)return'#000000';return'#'+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,'0')).join('');}
  colI.value=rgb2hex(el.style.color)||'#000000';
  colI.addEventListener('input',()=>el.style.color=colI.value);
  pe.appendChild(mkRow('Color',colI));

  // Letter spacing
  const lsI=document.createElement('input');lsI.type='number';lsI.value=parseFloat(el.style.letterSpacing)||0;lsI.step=0.5;
  lsI.style.cssText='flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 7px;font-size:12px';
  lsI.addEventListener('input',()=>el.style.letterSpacing=lsI.value+'px');
  pe.appendChild(mkRow('Spacing',lsI));

  // X / Y
  const xiI=document.createElement('input');xiI.type='number';xiI.value=Math.round(parseFloat(el.style.left)||0);
  const yiI=document.createElement('input');yiI.type='number';yiI.value=Math.round(parseFloat(el.style.top)||0);
  [xiI,yiI].forEach(i=>i.style.cssText='flex:1;background:#090f17;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 7px;font-size:12px');
  xiI.addEventListener('input',()=>el.style.left=xiI.value+'px');
  yiI.addEventListener('input',()=>el.style.top=yiI.value+'px');
  pe.appendChild(mkRow('X',xiI));
  pe.appendChild(mkRow('Y',yiI));

  // Duplicate
  const dupBtn=document.createElement('button');dupBtn.textContent='Duplicate';dupBtn.style.cssText='width:100%;margin-top:4px';
  dupBtn.onclick=()=>{
    const cfg={...lyr.cfg,id:++uid,x:parseFloat(el.style.left)+20,y:parseFloat(el.style.top)+20,
      text:Array.from(el.childNodes).filter(n=>n.nodeType===3).map(n=>n.nodeValue).join('').trim(),
      fs:parseFloat(el.style.fontSize),fw:el.style.fontWeight,color:el.style.color};
    select(addLayer(cfg));
  };
  pe.appendChild(dupBtn);

  // Delete
  const delBtn=document.createElement('button');delBtn.textContent='Delete';delBtn.style.cssText='width:100%;margin-top:4px;color:#f87171;background:rgba(185,28,28,.1);border-color:rgba(185,28,28,.3)';
  delBtn.onclick=()=>{el.remove();layers=layers.filter(l=>l.el!==el);sel=null;showEmpty();};
  pe.appendChild(delBtn);
}

function toggleOutlines(){
  outlines=!outlines;
  document.getElementById('btnOut').textContent='Outlines: '+(outlines?'On':'Off');
  layers.forEach(l=>{if(outlines)l.el.classList.add('outlines');else l.el.classList.remove('outlines');});
}

function addText(){
  const el=addLayer({type:'text',text:'New Text',x:200,y:300,fs:80,fw:'700',ff:"system-ui,Arial,sans-serif",color:'#0a0e1a',id:++uid});
  select(el);
}

function resetAll(){layers.forEach(l=>l.el.remove());layers=[];sel=null;uid=0;showEmpty();buildDefault();fitLabel();}

// Templates
const TPL_KEY='axisChemsStudio_v1';
function loadTpls(){try{return JSON.parse(localStorage.getItem(TPL_KEY))||[];}catch{return[];}}
function saveTpls(list){localStorage.setItem(TPL_KEY,JSON.stringify(list));}

function saveTpl(){
  const name=prompt('Template name:','My Template');
  if(!name)return;
  const state=layers.map(l=>{const e=l.el;return{...l.cfg,x:parseFloat(e.style.left),y:parseFloat(e.style.top),
    text:Array.from(e.childNodes).filter(n=>n.nodeType===3).map(n=>n.nodeValue).join('').trim(),
    fs:parseFloat(e.style.fontSize),fw:e.style.fontWeight,color:e.style.color,
    ls:e.style.letterSpacing,pill:l.cfg.pill,pillColor:l.cfg.pillColor,pillBorder:l.cfg.pillBorder};});
  const list=loadTpls();
  const idx=list.findIndex(t=>t.name===name);
  if(idx>=0)list[idx]={name,state};else list.push({name,state});
  saveTpls(list);
  const b=document.querySelector('.gold');
  const orig=b.textContent;b.textContent='✓ Saved';
  setTimeout(()=>b.textContent=orig,2000);
  renderTplList();
}

function renderTplList(){
  const list=loadTpls();
  const tl=document.getElementById('tplList');
  tl.innerHTML='';
  if(!list.length){tl.innerHTML='<div style="font-size:10px;color:var(--muted)">No templates yet.</div>';return;}
  list.forEach((t,i)=>{
    const row=document.createElement('div');row.className='tpl-row';
    const nm=document.createElement('span');nm.className='tpl-nm';nm.textContent=t.name;
    const lb=document.createElement('button');lb.className='tpl-load';lb.textContent='Load';
    lb.onclick=()=>{layers.forEach(l=>l.el.remove());layers=[];sel=null;uid=0;
      t.state.forEach(cfg=>{if(cfg.id>uid)uid=cfg.id;addLayer(cfg);});showEmpty();fitLabel();};
    const db=document.createElement('button');db.className='tpl-del';db.textContent='✕';
    db.onclick=()=>{const ls=loadTpls();ls.splice(i,1);saveTpls(ls);renderTplList();};
    row.appendChild(nm);row.appendChild(lb);row.appendChild(db);
    tl.appendChild(row);
  });
}

function fitLabel(){
  const r=stageWrap.getBoundingClientRect();
  const s=Math.min((r.width-48)/LW,(r.height-48)/LH,1);
  stage.style.transform='scale('+s+')';
  stage.style.width=LW+'px';stage.style.height=LH+'px';
}
window.addEventListener('resize',fitLabel);

function exportPNG(){
  const prev=sel;
  if(sel){sel.classList.remove('sel');sel=null;}
  const po=outlines;if(outlines)toggleOutlines();
  html2canvas(label,{scale:2,width:LW,height:LH,backgroundColor:null,useCORS:true,allowTaint:true,logging:false})
    .then(canvas=>{
      const name=(layers.find(l=>l.cfg.type!=='img')?.el.textContent.trim()||'axis-label').replace(/[^a-z0-9_\-]/gi,'_');
      const a=document.createElement('a');a.download=name+'.png';a.href=canvas.toDataURL('image/png');a.click();
      if(!po)toggleOutlines();if(prev)select(prev);
    });
}

// Catalog dropdown
(function(){
  const ps=document.getElementById('preset');
  const c=document.createElement('option');c.value='__c__';c.textContent='Custom (type your own)';ps.appendChild(c);
  Object.entries(CATALOG).forEach(([g,items])=>{
    const og=document.createElement('optgroup');og.label=g;
    items.forEach(([n,d,form])=>{
      const o=document.createElement('option');o.value=JSON.stringify([n,d,form]);
      o.textContent=n+' · '+d;og.appendChild(o);
    });
    ps.appendChild(og);
  });
  ps.addEventListener('change',e=>{
    const v=e.target.value;if(!v||v==='__c__')return;
    const [name,dose]=JSON.parse(v);
    const texts=layers.filter(l=>l.cfg.type!=='img');
    if(texts[0]){const h=texts[0].el.querySelector('.handle');texts[0].el.textContent=name.toUpperCase();if(h)texts[0].el.appendChild(h);}
    if(texts[1]){const h=texts[1].el.querySelector('.handle');texts[1].el.textContent=dose;if(h)texts[1].el.appendChild(h);}
    if(sel)buildPanel(sel);
    e.target.value='';
  });
})();

buildDefault();fitLabel();showEmpty();
</script>
</body>
</html>
